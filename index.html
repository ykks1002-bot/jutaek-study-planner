<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주택관리사 학습계획 플래너</title>
  <meta name="description" content="주택관리사 시험 목표에 맞는 개인별 학습계획을 자동으로 설계해 드립니다." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --orange: #ea580c;
      --orange-dark: #c2410c;
      --orange-light: #fff7ed;
      --orange-mid: #fed7aa;
      --amber: #d97706;
      --green: #10b981;
      --red: #ef4444;
      --purple: #7c3aed;
      --gray-50: #fafaf9;
      --gray-100: #f5f5f4;
      --gray-200: #e7e5e4;
      --gray-400: #a8a29e;
      --gray-500: #78716c;
      --gray-700: #44403c;
      --gray-900: #1c1917;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #7c2d12 0%, #ea580c 60%, #fb923c 100%);
      color: #fff;
      padding: 28px 20px 24px;
      text-align: center;
    }
    header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -.5px; }
    header p  { margin-top: 6px; opacity: .8; font-size: .95rem; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }
    .steps-top { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
    .steps-top .card { margin-bottom: 0; }
    @media (max-width: 600px) { .steps-top { grid-template-columns: 1fr; } }
    .exam-banner {
      background: linear-gradient(135deg, #7c2d12, #ea580c);
      color: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }
    .exam-banner .main-date { font-size: clamp(1rem, 3vw, 1.2rem); font-weight: 700; }
    .exam-banner .sub       { font-size: .8rem; opacity: .75; margin-bottom: 4px; }
    .exam-banner .dday      { margin-top: 14px; font-size: .9rem; opacity: .9; width: 100%; border-top: 1px solid rgba(255,255,255,.2); padding-top: 12px; }
    .exam-dates-row { display: flex; gap: 20px; flex-wrap: wrap; flex: 1; }
    .exam-date-block { min-width: 140px; }
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .card h2 {
      font-size: 1rem; font-weight: 700; color: var(--orange);
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    }
    .step-num {
      background: var(--orange); color: #fff;
      width: 26px; height: 26px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .78rem; font-weight: 800; flex-shrink: 0;
    }
    .opt-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    @media (max-width: 400px) { .opt-group { grid-template-columns: 1fr; } }
    .opt-btn {
      padding: 14px 10px;
      border: 2px solid var(--gray-200);
      border-radius: 9px;
      background: #fff;
      color: var(--gray-700);
      cursor: pointer;
      font-size: .95rem; font-weight: 700;
      text-align: center;
      transition: border-color .15s, background .15s, color .15s;
    }
    .opt-btn:hover  { border-color: var(--orange); color: var(--orange); }
    .opt-btn.active { border-color: var(--orange); background: var(--orange); color: #fff; }
    .opt-btn.disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
    .hours-group {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    @media (max-width: 400px) { .hours-group { grid-template-columns: repeat(3, 1fr); } }
    .hours-btn {
      padding: 12px 6px;
      border: 2px solid var(--gray-200);
      border-radius: 9px; background: #fff;
      color: var(--gray-700); cursor: pointer;
      font-size: .95rem; font-weight: 700;
      text-align: center;
      transition: border-color .15s, background .15s, color .15s;
    }
    .hours-btn .sub { font-size: .65rem; font-weight: 400; display: block; margin-top: 2px; color: var(--gray-400); }
    .hours-btn:hover  { border-color: var(--orange); color: var(--orange); }
    .hours-btn.active { border-color: var(--orange); background: var(--orange); color: #fff; }
    .hours-btn.active .sub { color: rgba(255,255,255,.8); }
    .cal-wrap { user-select: none; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 10px; }
    .cal-nav {
      background: none; border: 1px solid var(--gray-200); cursor: pointer;
      font-size: 1rem; color: var(--orange); padding: 4px 10px;
      border-radius: 7px; transition: background .12s;
    }
    .cal-nav:hover { background: var(--orange-light); }
    .cal-nav:disabled { color: var(--gray-400); cursor: default; border-color: transparent; }
    .cal-title { font-weight: 700; font-size: .97rem; }
    .cal-grid  { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dh { text-align: center; font-size: .68rem; font-weight: 600; color: var(--gray-500); padding: 3px 0; }
    .cal-dh.sun { color: #ef4444; }
    .cal-dh.sat { color: var(--orange); }
    .cal-day { text-align: center; font-size: .85rem; padding: 7px 2px; border-radius: 50%; cursor: pointer; line-height: 1; transition: background .1s; }
    .cal-day:empty { pointer-events: none; }
    .cal-day.disabled { color: var(--gray-400); cursor: not-allowed; }
    .cal-day.sun { color: #ef4444; }
    .cal-day.sat { color: var(--orange); }
    .cal-day.today { font-weight: 800; }
    .cal-day.selected { background: var(--orange) !important; color: #fff !important; font-weight: 700; }
    .cal-day:not(.disabled):not(.selected):hover { background: var(--orange-light); }
    .cal-today-btn {
      display: block; width: 100%; margin-top: 8px;
      padding: 7px; border: 1px solid var(--gray-200);
      border-radius: 8px; background: #fff; cursor: pointer;
      font-size: .85rem; font-weight: 600; color: var(--gray-700);
      transition: all .12s;
    }
    .cal-today-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
    .cal-selected-label { margin-top: 8px; font-size: .8rem; color: var(--orange); text-align: center; font-weight: 600; }
    .hours-hint { margin-top: 12px; font-size: .84rem; padding: 10px 14px; border-radius: 8px; background: var(--orange-light); border-left: 3px solid var(--orange); color: var(--gray-700); font-style: italic; }
    .btn-gen {
      width: 100%; padding: 16px;
      background: var(--orange); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer; letter-spacing: .3px;
      transition: background .15s, transform .1s;
      margin-bottom: 32px;
    }
    .btn-gen:hover  { background: var(--orange-dark); }
    .btn-gen:active { transform: scale(.98); }
    .btn-gen:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }
    .results-header {
      font-size: 1.1rem; font-weight: 700; color: var(--gray-700);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--gray-200);
    }
    .stat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
    @media (max-width: 500px) { .stat-grid { grid-template-columns: repeat(3, 1fr); } }
    .stat-item { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 10px; padding: 14px 12px; text-align: center; }
    .stat-item .val { font-size: clamp(1.1rem, 2.2vw, 1.7rem); font-weight: 800; color: var(--orange); }
    .stat-item .lbl { font-size: .72rem; color: var(--gray-500); margin-top: 3px; }
    .rm-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .rm-grid { display: grid; gap: 6px; margin-bottom: 4px; }
    .rm-cell {
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 10px 5px 8px; border-radius: 10px;
      border: 2px solid var(--gray-200); text-align: center; gap: 4px;
      background: var(--gray-100); position: relative; min-width: 80px;
    }
    .rm-cell.included { border-color: var(--orange); background: var(--orange-light); }
    .rm-cell.partial  { border-color: var(--amber); background: #fffbeb; }
    .rm-cell.skipped  { opacity: .4; }
    .rm-cell:not(:last-child)::after {
      content: '›';
      position: absolute; right: -10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; text-align: center;
      font-size: 1.3rem; font-weight: 700; line-height: 1;
      color: var(--gray-400); z-index: 2; pointer-events: none;
    }
    .rm-cell.included:not(:last-child)::after { color: var(--orange); }
    .rm-cell.partial:not(:last-child)::after  { color: var(--amber); }
    .rm-cell.done { border-color: var(--green) !important; background: #f0fdf4 !important; }
    .rm-cell.done:not(:last-child)::after { color: var(--green) !important; }
    .rm-seq  { font-size: .6rem; font-weight: 800; color: var(--gray-400); }
    .rm-cell.included .rm-seq { color: var(--orange); }
    .rm-cell.partial  .rm-seq { color: var(--amber); }
    .rm-cell.done     .rm-seq { color: var(--green); }
    .rm-name { font-size: .7rem; font-weight: 700; line-height: 1.3; overflow-wrap: anywhere; width: 100%; }
    .rm-cnt  { font-size: .62rem; color: var(--gray-500); }
    .rm-icon { font-size: .88rem; }
    .rm-stlbl { font-size: .62rem; font-weight: 700; }
    .rm-chk {
      margin-top: 5px; width: 100%; padding: 6px 2px;
      border-radius: 8px; border: 2px solid currentColor;
      font-size: .68rem; font-weight: 800; cursor: pointer;
      transition: all .15s; line-height: 1.3;
      display: flex; align-items: center; justify-content: center; gap: 3px;
      background: transparent;
    }
    .rm-cell.included .rm-chk { color: #fff; background: var(--orange); border-color: var(--orange); }
    .rm-cell.partial  .rm-chk { color: #fff; background: var(--amber);  border-color: var(--amber); }
    .rm-cell.done     .rm-chk { color: #fff; background: var(--green);  border-color: var(--green); }
    .rm-chk:hover { filter: brightness(.93); transform: scale(1.03); }
    .rm-section-label {
      font-size: .75rem; font-weight: 700; letter-spacing: .04em;
      color: var(--gray-500); text-transform: uppercase;
      padding: 8px 0 4px; display: flex; align-items: center; gap: 6px;
    }
    .rm-section-label span { flex: 1; height: 1px; background: var(--gray-200); }
    .prog-bar-wrap {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; padding: 10px 14px;
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: 9px; gap: 12px;
    }
    .prog-dots { display: flex; gap: 5px; flex-wrap: wrap; }
    .prog-dot  { width: 13px; height: 13px; border-radius: 50%; background: var(--gray-200); flex-shrink: 0; }
    .prog-dot.pd-done    { background: var(--green); }
    .prog-dot.pd-active  { background: var(--orange); }
    .prog-dot.pd-partial { background: var(--amber); }
    .prog-dot.pd-skip    { background: var(--gray-200); opacity: .4; }
    .prog-txt { font-size: .85rem; font-weight: 700; white-space: nowrap; }
    .prog-reset { padding: 5px 12px; border: 1px solid var(--gray-200); border-radius: 6px; background: #fff; font-size: .75rem; color: var(--gray-500); cursor: pointer; white-space: nowrap; }
    .prog-reset:hover { border-color: var(--red); color: var(--red); }
    .study-path { margin-top: 16px; padding: 14px 16px; background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px; }
    .study-path .sp-label { font-size: .82rem; font-weight: 700; color: #15803d; margin-bottom: 10px; }
    .sp-scroll { overflow-x: auto; }
    .sp-items { display: grid; gap: 6px; }
    .sp-tag {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 6px; border-radius: 10px; border: 2px solid #86efac;
      background: #dcfce7; color: #166534;
      font-size: .78rem; font-weight: 700; text-align: center; gap: 3px;
      position: relative;
    }
    .sp-tag:not(:last-child)::after {
      content: '›'; position: absolute; right: -10px; top: 50%;
      transform: translateY(-50%); width: 14px; text-align: center;
      font-size: 1.3rem; font-weight: 700; line-height: 1;
      color: #16a34a; z-index: 2; pointer-events: none;
    }
    .sp-tag .sp-lec { font-size: .65rem; font-weight: 400; opacity: .8; }
    .skip-note { margin-top: 10px; padding: 10px 14px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; font-size: .8rem; color: var(--gray-500); }
    .prog-hint { margin-top: 14px; padding: 12px 16px; background: linear-gradient(135deg, var(--orange-light), #f0fdf4); border: 1px solid var(--orange-mid); border-radius: 10px; font-size: .84rem; color: var(--gray-700); text-align: center; line-height: 1.7; }
    .prog-hint strong { color: var(--orange); }
    .week-scroll { overflow-x: auto; }
    table.week { width: 100%; border-collapse: collapse; font-size: .83rem; }
    table.week th { background: var(--orange); color: #fff; padding: 9px 6px; text-align: center; font-weight: 700; }
    table.week th:first-child { background: #7c2d12; }
    table.week th.sun-th { background: #9f1239; }
    table.week td { padding: 10px 6px; text-align: center; border: 1px solid var(--gray-200); }
    table.week td.sun-td { background: #fff1f2; }
    table.week td.rest-td { background: var(--gray-100); }
    table.week tr:nth-child(even) td { background: var(--gray-50); }
    table.week tr:nth-child(even) td.sun-td { background: #ffe4e6; }
    .stag { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: .72rem; font-weight: 700; white-space: nowrap; }
    .s0 { background: #fed7aa; color: #9a3412; }
    .s1 { background: #d1fae5; color: #065f46; }
    .s2 { background: #ede9fe; color: #4c1d95; }
    .s3 { background: #dbeafe; color: #1e40af; }
    .s4 { background: #fce7f3; color: #831843; }
    .gantt-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .gantt-inner { min-width: 520px; }
    .gantt-header { display: flex; margin-bottom: 2px; }
    .gantt-label-col-h { width: 110px; flex-shrink: 0; }
    .gantt-month-headers { flex: 1; display: grid; }
    .gantt-month-h { text-align: center; font-size: .72rem; font-weight: 700; color: var(--gray-500); padding: 4px 0; border-left: 1px solid var(--gray-200); }
    .gantt-body { display: flex; }
    .gantt-labels { width: 110px; flex-shrink: 0; }
    .gantt-label-row { display: flex; align-items: center; font-size: .68rem; color: var(--gray-500); font-weight: 600; padding-right: 8px; line-height: 1.3; }
    .gantt-label-row span { display: block; line-height: 1.3; }
    .gantt-timeline-area { flex: 1; position: relative; }
    .gantt-gridlines { position: absolute; inset: 0; display: grid; pointer-events: none; }
    .gantt-gridline { border-left: 1px solid var(--gray-200); }
    .gantt-gridline:first-child { border-left: none; }
    .gantt-bars { position: relative; }
    .gantt-bar {
      position: absolute; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 10px; box-shadow: 0 2px 6px rgba(0,0,0,.15);
      cursor: pointer; overflow: hidden; transition: filter .15s, box-shadow .15s;
    }
    .gantt-bar:hover { filter: brightness(1.12); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
    .gantt-bar span { color: #fff; font-size: .68rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; text-shadow: 0 1px 2px rgba(0,0,0,.18); }
    #gantt-tooltip { position: fixed; z-index: 9999; background: #1c1917; color: #fff; padding: 6px 13px; border-radius: 8px; font-size: .78rem; font-weight: 600; pointer-events: none; display: none; box-shadow: 0 4px 14px rgba(0,0,0,.3); white-space: nowrap; }
    .mo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .mo-card { border: 1px solid var(--gray-200); border-radius: 10px; overflow: hidden; }
    .mo-head { background: var(--orange); color: #fff; padding: 9px 14px; font-weight: 700; font-size: .9rem; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .mo-head.exam1-head { background: #7c3aed; }
    .mo-head.exam2-head { background: #dc2626; }
    .mo-body { padding: 12px 14px; }
    .mo-meta { font-size: .76rem; color: var(--gray-500); margin-bottom: 4px; }
    .mo-item { margin-top: 7px; }
    .mo-item-label { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: 3px; }
    .mo-item-label span:last-child { color: var(--orange); font-weight: 700; }
    .pb-bg { background: var(--gray-200); border-radius: 3px; height: 6px; overflow: hidden; }
    .pb { height: 100%; border-radius: 3px; background: var(--orange); }
    .pb.pb2 { background: var(--purple); }
    .mo-done { color: var(--green); font-weight: 600; font-size: .83rem; }
    .milestone-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 12px;
      font-size: .7rem; font-weight: 700;
    }
    .ms-1st { background: rgba(124,58,237,.15); color: #7c3aed; }
    .ms-2nd { background: rgba(220,38,38,.15); color: #dc2626; }
    .my-plan-btn {
      background: rgba(255,255,255,.18); border: 2px solid rgba(255,255,255,.75);
      border-radius: 12px; padding: 10px 18px; color: #fff; cursor: pointer;
      text-align: center; transition: all .15s; align-self: center; min-width: 130px;
    }
    .my-plan-btn:hover { background: rgba(255,255,255,.32); transform: scale(1.04); }
    .mpb-tag { display: inline-block; font-size: .62rem; font-weight: 700; letter-spacing: .4px; background: rgba(255,255,255,.25); border-radius: 10px; padding: 2px 8px; margin-bottom: 6px; }
    .mpb-val    { font-size: .92rem; font-weight: 800; margin-bottom: 4px; }
    .mpb-action { font-size: .7rem; opacity: .85; }
    #results { display: none; }
    .avail-note { font-size: .75rem; color: var(--amber); margin-top: 8px; padding: 6px 10px; background: #fffbeb; border-radius: 6px; border: 1px solid #fde68a; }
    /* ═══ 동차 로드맵 테이블 ═══ */
    .dc-rm-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .dc-rm-table { border-collapse: separate; border-spacing: 3px; min-width: 540px; width: 100%; font-size: .82rem; }
    .dc-rm-table thead th {
      background: var(--orange); color: #fff;
      padding: 7px 4px; text-align: center;
      font-weight: 700; font-size: .72rem;
      white-space: nowrap; border-radius: 6px; min-width: 42px;
    }
    .dc-rm-table th.dc-exam1-hd { background: #7c3aed; }
    .dc-rm-table th.dc-exam2-hd { background: #dc2626; }
    .dc-yr { display: block; font-size: .54rem; opacity: .75; }
    .dc-exam-tag { display: block; font-size: .55rem; background: rgba(255,255,255,.28); border-radius: 8px; padding: 1px 3px; margin-top: 2px; }
    .dc-rm-row-hd { min-width: 62px; padding: 8px 10px; background: var(--gray-100); border-radius: 6px; vertical-align: middle; text-align: left; }
    .dc-cat-lbl { display: inline-block; font-size: .72rem; font-weight: 800; padding: 2px 7px; border-radius: 10px; }
    .dc-cat1 { background: var(--orange-mid); color: #9a3412; }
    .dc-cat2 { background: #ede9fe; color: #4c1d95; }
    .dc-cat-sub { display: block; font-size: .61rem; color: var(--gray-400); margin-top: 3px; }
    .dc-rm-item { padding: 10px 6px; text-align: center; vertical-align: middle; border-radius: 7px; }
    .dc-rm-1 { background: var(--orange-light); border: 2px solid var(--orange-mid); }
    .dc-rm-2 { background: #f5f3ff; border: 2px solid #ddd6fe; }
    .dc-rm-done { background: #f0fdf4 !important; border-color: #86efac !important; }
    .dc-rm-empty { background: var(--gray-100); border-radius: 6px; text-align: center; vertical-align: middle; }
    .dc-item-name { font-weight: 700; font-size: .75rem; color: var(--gray-900); line-height: 1.3; }
    .dc-item-lec { font-size: .63rem; color: var(--gray-400); margin-top: 3px; }

<script>
/* ═══════════════ DATA ═══════════════ */
const EXAM_1 = { 2026: new Date(2026,5,27), 2027: new Date(2027,5,28) };
const EXAM_2 = { 2026: new Date(2026,8,19), 2027: new Date(2027,8,20) };
const TODAY  = new Date();
const MY_PLAN_KEY = 'jtm_my_plan';

function getExamDate(t, y) {
  t = t || S.target; y = y || S.year;
  return (t === '1차') ? EXAM_1[y] : EXAM_2[y];
}

// 1차 curriculum (3 subjects: 회계원리, 시설개론, 민법)
const CURRS_1 = [
  { seq:1, name:'기초이론',               pri:6, total:36,  openM:-7  },

];

// 2차 curriculum (2 subjects: 관계법규, 관리실무)
// 우선순위: 핵심이론(1) > 마무리100선(2) > 동형모의고사(3) > 단원별(객관식)(4) > 단원별(주관식)(5) > 이론완성(6~7) > 기초이론(8)
// 단원별 문제풀이는 7월 개강 → 핵심이론과 7~8월 병행
const CURRS_2 = [
  { seq:1, name:'기초이론',                    pri:8, total:24,  openM:-10 },
  { seq:2, name:'이론완성(上)',                 pri:7, total:96,  openM:-11 },
  { seq:3, name:'이론완성(下)',                 pri:6, total:92,  openM:1   },
  { seq:4, name:'단원별<br>문제풀이<br>(객관식)', pri:4, total:150, openM:7 },
  { seq:5, name:'단원별<br>문제풀이<br>(주관식)', pri:5, total:56,  openM:7 },
  { seq:6, name:'핵심이론',                    pri:1, total:144, openM:7   },
  { seq:7, name:'마무리<br>100선특강',         pri:2, total:16,  openM:9   },
  { seq:8, name:'동형모의고사',                pri:3, total:24,  openM:9   },
];

// 동차 curriculum (combined, targeting 2차 exam date)
const CURRS_D = [
  { seq:1,  name:'[1차]기본이론',          pri:1,  total:192, openM:-10, cat:'1차' },
  { seq:2,  name:'[1차]핵심&문제풀이',     pri:2,  total:192, openM:3,   cat:'1차' },
  { seq:3,  name:'[2차]핵심이론',          pri:3,  total:144, openM:7,   cat:'2차' },
  { seq:4,  name:'[2차]단원별(객관식)',     pri:4,  total:150, openM:3,   cat:'2차' },
  { seq:5,  name:'[1차]마무리100선',       pri:5,  total:24,  openM:6,   cat:'1차' },
  { seq:6,  name:'[2차]단원별(주관식)',     pri:6,  total:56,  openM:6,   cat:'2차' },
  { seq:7,  name:'[1차]동형모의고사',      pri:7,  total:36,  openM:6,   cat:'1차' },
  { seq:8,  name:'[2차]마무리100선',       pri:8,  total:16,  openM:9,   cat:'2차' },
  { seq:9,  name:'[2차]동형모의고사',      pri:9,  total:24,  openM:9,   cat:'2차' },
  { seq:10, name:'[1차]이론완성',          pri:10, total:128, openM:1,   cat:'1차' },
  { seq:11, name:'[2차]이론완성(上)',       pri:11, total:96,  openM:-11, cat:'2차' },
  { seq:12, name:'[2차]이론완성(下)',       pri:12, total:92,  openM:1,   cat:'2차' },
  { seq:13, name:'[1차]기초이론',          pri:13, total:36,  openM:-7,  cat:'1차' },
  { seq:14, name:'[2차]기초이론',          pri:14, total:24,  openM:-10, cat:'2차' },
];

function getCurrs() {
  if (S.target === '1차')  return CURRS_1;
  if (S.target === '2차')  return CURRS_2;
  return CURRS_D;
}

const SUBJECTS = {
  '1차':  ['회계원리', '시설개론', '민법'],
  '2차':  ['관계법규', '관리실무'],
  '동차': ['회계원리', '시설개론', '민법', '관계법규', '관리실무'],
};
const SHORT = { '회계원리':'회계원리', '시설개론':'시설개론', '민법':'민법', '관계법규':'관계법규', '관리실무':'관리실무' };
const REC_HOURS = { '1차':4, '2차':3, '동차':6 };

/* ═══════════════ STATE ═══════════════ */
const S = { year:null, target:null, startDate:null, hours:null };
let calYear  = TODAY.getFullYear();
let calMonth = TODAY.getMonth();
const CAL_MIN = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
let   calMax  = new Date(2026, 11, 31);

/* ═══════════════ INIT ═══════════════ */
(function init() {
  document.getElementById('dday-text').textContent = '연도와 목표를 선택하면 D-day가 표시됩니다';
  renderCalendar();
  positionMyPlanBtn();

  const hoursGroup = document.getElementById('hours-group');
  const hoursData = [
    { h:3, lbl:'3시간', sub:'' },
    { h:4, lbl:'4시간', sub:'' },
    { h:5, lbl:'5시간', sub:'' },
    { h:6, lbl:'6시간', sub:'' },
    { h:7, lbl:'6시간+', sub:'이상' },
  ];
  hoursData.forEach(({ h, lbl, sub }) => {
    const btn = document.createElement('button');
    btn.className = 'hours-btn';
    btn.dataset.v = h;
    btn.innerHTML = `${lbl}<span class="sub">${sub || '&nbsp;'}</span>`;
    btn.onclick = () => pickHours(btn, h);
    hoursGroup.appendChild(btn);
  });
  updateMyPlanBtn();
})();

/* ═══════════════ AVAILABILITY ═══════════════ */
function getAvailableTargets(year, startMonth) {
  const curYear = TODAY.getFullYear();
  if (year === curYear) {
    if (startMonth <= 4) return ['1차','2차','동차'];
    if (startMonth <= 7) return ['2차'];
    return [];
  }
  return ['1차','2차','동차'];
}

function updateTargetAvailability() {
  if (!S.year || !S.startDate) return;
  const startMonth = S.startDate.getMonth() + 1;
  const avail = getAvailableTargets(S.year, startMonth);
  const noteEl = document.getElementById('avail-note');
  document.querySelectorAll('#target-group .opt-btn').forEach(b => {
    const isAvail = avail.includes(b.dataset.v);
    b.classList.toggle('disabled', !isAvail);
    if (!isAvail && S.target === b.dataset.v) {
      S.target = null;
      b.classList.remove('active');
    }
  });
  if (avail.length === 0) {
    noteEl.style.display = '';
    noteEl.textContent = '⚠️ 선택한 연도의 시험 준비 기간이 지났습니다. 다음 연도를 선택해주세요.';
  } else if (avail.length < 3) {
    noteEl.style.display = '';
    noteEl.textContent = `⚠️ ${S.year}년 ${startMonth}월 시작은 ${avail.join(', ')} 목표만 가능합니다.`;
  } else {
    noteEl.style.display = 'none';
  }
}

/* ═══════════════ UI HELPERS ═══════════════ */
function pickYear(btn) {
  document.getElementById('year-group').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.year = parseInt(btn.dataset.v);
  calMax = S.year === 2027 ? new Date(2027, 8, 20) : new Date(2026, 8, 19);
  if (S.startDate && S.startDate > calMax) { S.startDate = null; }
  renderCalendar();
  updateBanner();
  updateTargetAvailability();
}

function pick(btn, key) {
  if (btn.classList.contains('disabled')) return;
  btn.closest('.opt-group').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S[key] = btn.dataset.v;
  updateBanner();
  updateHoursHint();
}

function updateBanner() {
  if (!S.year) return;
  const BANNER = {
    2026: {
      sub1:'2026년 제29회 1차 시험', date1:'시험일 2026년 6월 27일 (토)',
      sub2:'2026년 제29회 2차 시험', date2:'시험일 2026년 9월 19일 (토)',
      apply1:'1차 원서접수 2026.05.11~05.15', apply2:'2차 원서접수 2026.08.10~08.14',
    },
    2027: {
      sub1:'2027년 제30회 1차 시험 (예정)', date1:'시험일 2027년 6월 (토) 예정',
      sub2:'2027년 제30회 2차 시험 (예정)', date2:'시험일 2027년 9월 (토) 예정',
      apply1:'1차 원서접수 2027년 5월 예정', apply2:'2차 원서접수 2027년 8월 예정',
    },
  };
  const b = BANNER[S.year];
  document.getElementById('banner-sub1').textContent  = b.sub1;
  document.getElementById('banner-date1').textContent = b.date1;
  document.getElementById('banner-sub2').textContent  = b.sub2;
  document.getElementById('banner-date2').textContent = b.date2;

  const t = S.target;
  const block2 = document.getElementById('banner-block2');
  const applyEl = document.getElementById('banner-apply');
  if (!t || t === '1차') {
    block2.style.display = 'none';
    applyEl.innerHTML = `<div style="font-size:.8rem;opacity:.75;margin-bottom:2px;">원서접수</div><div style="font-weight:600;font-size:.88rem;">${b.apply1}</div>`;
  } else if (t === '2차') {
    block2.style.display = 'none';
    document.getElementById('banner-sub1').textContent  = b.sub2;
    document.getElementById('banner-date1').textContent = b.date2;
    applyEl.innerHTML = `<div style="font-size:.8rem;opacity:.75;margin-bottom:2px;">원서접수</div><div style="font-weight:600;font-size:.88rem;">${b.apply2}</div>`;
  } else {
    block2.style.display = '';
    document.getElementById('banner-sub1').textContent  = b.sub1;
    document.getElementById('banner-date1').textContent = b.date1;
    applyEl.innerHTML = `<div style="font-size:.75rem;opacity:.75;">${b.apply1}</div><div style="font-size:.75rem;opacity:.75;margin-top:3px;">${b.apply2}</div>`;
  }

  if (S.target) {
    const examDate = getExamDate();
    const todayMid = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
    const diff = Math.ceil((examDate - todayMid) / 864e5);
    const tLbl = S.target === '동차' ? '2차' : S.target;
    document.getElementById('dday-text').textContent = diff > 0 ? `${tLbl} 시험까지 D-${diff}일` : diff === 0 ? '오늘이 시험일입니다!' : '시험일이 지났습니다.';
  } else {
    document.getElementById('dday-text').textContent = '목표를 선택하면 D-day가 표시됩니다';
  }
}

function renderCalendar() {
  const grid = document.getElementById('month-grid');
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInM  = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDisabled = new Date(calYear, calMonth, 1) <= new Date(CAL_MIN.getFullYear(), CAL_MIN.getMonth(), 1);
  const nextDisabled = new Date(calYear, calMonth, 1) >= new Date(calMax.getFullYear(), calMax.getMonth(), 1);
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames   = ['일','월','화','수','목','금','토'];

  let h = `<div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)" ${prevDisabled?'disabled':''}>←</button>
      <span class="cal-title">${monthNames[calMonth]} ${calYear}</span>
      <button class="cal-nav" onclick="calNav(1)" ${nextDisabled?'disabled':''}>→</button>
    </div>
    <div class="cal-grid">`;
  dayNames.forEach((d, i) => {
    const cls = i===0 ? 'sun' : i===6 ? 'sat' : '';
    h += `<div class="cal-dh ${cls}">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) h += `<div class="cal-day"></div>`;
  for (let d = 1; d <= daysInM; d++) {
    const date   = new Date(calYear, calMonth, d);
    const dow    = date.getDay();
    const isPast = date < CAL_MIN;
    const isOver = date > calMax;
    const isTod  = date.getTime() === CAL_MIN.getTime();
    const isSel  = S.startDate &&
      date.getFullYear() === S.startDate.getFullYear() &&
      date.getMonth()    === S.startDate.getMonth() &&
      date.getDate()     === S.startDate.getDate();
    const disabled = isPast || isOver;
    let cls = 'cal-day';
    if (disabled) cls += ' disabled';
    else if (isSel) cls += ' selected';
    if (isTod) cls += ' today';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    const onclick = disabled ? '' : `onclick="pickDate(${calYear},${calMonth},${d})"`;
    h += `<div class="${cls}" ${onclick}>${d}</div>`;
  }
  h += `</div>`;
  const todayLabel = `${CAL_MIN.getMonth()+1}월 ${CAL_MIN.getDate()}일`;
  h += `<button class="cal-today-btn" onclick="goToday()">오늘 (${todayLabel})</button>`;
  if (S.startDate) {
    const mn  = S.startDate.getMonth() + 1;
    const dn  = S.startDate.getDate();
    const day = dayNames[S.startDate.getDay()];
    h += `<div class="cal-selected-label">📅 시작일: ${mn}월 ${dn}일 (${day})</div>`;
  }
  h += `</div>`;
  grid.innerHTML = h;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function goToday() {
  calYear  = CAL_MIN.getFullYear();
  calMonth = CAL_MIN.getMonth();
  pickDate(calYear, calMonth, CAL_MIN.getDate());
}

function pickDate(y, m, d) {
  S.startDate = new Date(y, m, d);
  calYear = y; calMonth = m;
  renderCalendar();
  updateTargetAvailability();
}

function pickHours(btn, h) {
  document.querySelectorAll('.hours-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.hours = h;
  updateHoursHint();
}

function positionMyPlanBtn() {

  if (spaceRight >= btnW + gap * 2) {

/* ═══════════════ AVAILABILITY CHECK ═══════════════ */
function isOpen(openM, moYear, moMonth, examYear) {
  if (openM === 0) return true;
  if (openM < 0) {
    const priorYear = examYear - 1;
    const priorMonth = -openM;
    if (moYear < priorYear) return false;
    if (moYear > priorYear) return true;
    return moMonth >= priorMonth;
  }
  if (moYear < examYear) return false;
  if (moYear > examYear) return true;
  return moMonth >= openM;
}

/* ═══════════════ 동차 DUAL-TRACK PLAN ═══════════════ */
// Phase A (시작 ~ 3월): 1차 4/6 + 2차(기초이론·이론완성) 2/6 병행
// Phase B (4~6월 15일): 1차 집중 100%
// 휴식: 6/16 ~ 6월 마지막주 월요일 전날
// Phase C (6월 마지막주 월요일 ~ 9/15): 2차 집중 (7~8월 핵심이론 중심)
function buildDongchaPlan() {
  const examYear  = S.year;
  const deadline1 = new Date(examYear, 5, 15);   // Jun 15: 1차 완료 목표
  const deadline2 = new Date(examYear, 8, 15);   // Sep 15: 2차 완료 목표
  const startDate = S.startDate;
  const startMid  = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
  const totalDays = Math.ceil((deadline2 - startMid) / 864e5);
  const lpd       = S.hours;

  // 6월 마지막 주 월요일
  function lastMondayOfJune(yr) {
    let d = new Date(yr, 5, 30);
    while (d.getDay() !== 1) d = new Date(d.getTime() - 86400000);
    return d;
  }
  const start2차 = lastMondayOfJune(examYear);

  // ── 월 목록 (startDate ~ 9월 15일) ──────────────────────────────
  const months = [];
  let curM = startDate.getMonth() + 1, curY = startDate.getFullYear();
  while (curY < examYear || (curY === examYear && curM <= 9)) {
    const daysInM = new Date(curY, curM, 0).getDate();
    const startDay = (curM === startDate.getMonth()+1 && curY === startDate.getFullYear()) ? startDate.getDate() : 1;
    const endDay   = (curY === examYear && curM === 9) ? 15 : daysInM;
    const sd = Math.max(0, endDay - startDay + 1);
    months.push({ m: curM, year: curY, sd, ld: sd, lec: sd * lpd, lec1: 0, lec2: 0, gapLec: 0 });
    curM++; if (curM > 12) { curM = 1; curY++; }
  }

  // ── 월별 용량 분배 ────────────────────────────────────────────────
  // Phase A: start ~ Mar → 4/6 1차 + 2/6 2차
  // Phase B: Apr ~ May → 100% 1차
  // June: 1-15 → 1차, gap, 마지막주 월요일~30 → 2차
  // Phase C: Jul ~ Sep → 100% 2차
  let cap1 = 0, cap2_early = 0, cap2_late = 0;
  months.forEach(mo => {
    mo.lec1 = 0; mo.lec2 = 0; mo.gapLec = 0;
    const isPhaseA = mo.year < examYear || (mo.year === examYear && mo.m <= 3);
    if (isPhaseA) {
      mo.lec1 = Math.round(mo.lec * 4 / 6);
      mo.lec2 = mo.lec - mo.lec1;
      cap2_early += mo.lec2;
    } else if (mo.year === examYear && mo.m < 6) {
      mo.lec1 = mo.lec;                                     // 4~5월: 100% 1차
    } else if (mo.year === examYear && mo.m === 6) {
      const sd_start = (mo.m === startDate.getMonth()+1 && mo.year === startDate.getFullYear())
        ? startDate.getDate() : 1;
      mo.lec1 = Math.max(0, 15 - sd_start + 1) * lpd;
      const start2Day = start2차.getDate();
      mo.lec2 = Math.max(0, 30 - start2Day + 1) * lpd;
      mo.gapLec = Math.max(0, start2Day - 16) * lpd;
      mo.lec = mo.lec1 + mo.gapLec + mo.lec2;
      mo.ld  = mo.lec / lpd;
      cap2_late += mo.lec2;
    } else {
      mo.lec2 = mo.lec;                                     // 7월~: 100% 2차
      cap2_late += mo.lec2;
    }
    cap1 += mo.lec1;
  });

  // ── 1차 배분 ────────────────────────────────────────────────────
  function allocate(currs, cap) {
    const sorted = currs.map(c => ({ ...c, needed: c.total })).sort((a, b) => a.pri - b.pri);
    let rem = cap;
    sorted.forEach(c => {
      if (rem >= c.needed) { c.status = 'full'; c.effective = c.needed; rem -= c.needed; }
      else                 { c.status = 'skipped'; c.effective = 0; }
    });
    return sorted;
  }
  const alloc1 = allocate(CURRS_D.filter(c => c.cat === '1차'), cap1);

  // ── 2차 배분 (buildPlan2차 방식) ────────────────────────────────
  const sorted2 = CURRS_D.filter(c => c.cat === '2차')
    .map(c => ({ ...c, needed: c.total, status: 'skipped', effective: 0 }));
  const toKey2 = m => m < 0 ? (examYear-1)*12+(-m) : examYear*12+(m||0);

  // 구간 B: 핵심이론(seq3), 마무리100선(seq8), 동형모의고사(seq9) — 항상 배분
  [3, 8, 9].forEach(seq => {
    const c = sorted2.find(x => x.seq === seq);
    if (c) { c.status = 'full'; c.effective = c.needed; }
  });

  // 구간 C: 단원별(seq4, seq6) — 7~8월 용량 기준
  const july_aug_lec2 = months
    .filter(mo => mo.year === examYear && (mo.m === 7 || mo.m === 8))
    .reduce((s, mo) => s + mo.lec2, 0);
  const can2Obj = july_aug_lec2 >= 144 + 150;
  const can2Sub = july_aug_lec2 >= 144 + 150 + 56;
  const c2obj = sorted2.find(c => c.seq === 4);
  const c2sub = sorted2.find(c => c.seq === 6);
  if (c2obj) { c2obj.status = can2Obj ? 'full' : 'skipped'; c2obj.effective = can2Obj ? c2obj.needed : 0; }
  if (c2sub) { c2sub.status = can2Sub ? 'full' : 'skipped'; c2sub.effective = can2Sub ? c2sub.needed : 0; }

  // Phase A early: 이론완성(11,12), 기초이론(14) — Phase A 2차 용량 기준
  sorted2.filter(c => [11, 12, 14].includes(c.seq))
    .sort((a, b) => toKey2(a.openM||0) - toKey2(b.openM||0))
    .reduce((rem, c) => {
      if (rem >= c.needed) { c.status = 'full'; c.effective = c.needed; return rem - c.needed; }
      return rem;
    }, cap2_early);

  const alloc2 = sorted2;

  // ── 결과 배열 ────────────────────────────────────────────────────
  const r1 = new Map(alloc1.map(c => [c.seq, c]));
  const r2 = new Map(alloc2.map(c => [c.seq, c]));
  const result = CURRS_D.map(orig => orig.cat === '1차' ? r1.get(orig.seq) : r2.get(orig.seq));
  const fullCount = result.filter(c => c.status === 'full').length;

  // ── 트랙 생성 ────────────────────────────────────────────────────
  function openKey(m) { return m < 0 ? (examYear-1)*12+(-m) : examYear*12+(m||0); }
  function makeTrack(allocated, deadlineDate) {
    const items = allocated
      .filter(c => c.status !== 'skipped')
      .sort((a, b) => {
        const d = openKey(a.openM||0) - openKey(b.openM||0);
        return d !== 0 ? d : (a.pri||99) - (b.pri||99);
      })
      .map(c => ({ seq: c.seq, name: c.name.replace(/<br>/g,''), remaining: c.effective, total: c.effective, openM: c.openM||0, cat: c.cat }));
    items.forEach((item, idx) => {
      const next = items[idx + 1];
      let toY, toM;
      if (next) {
        toY = next.openM < 0 ? examYear - 1 : examYear;
        toM = next.openM < 0 ? -next.openM : (next.openM || 1);
      } else {
        toY = deadlineDate.getFullYear(); toM = deadlineDate.getMonth() + 2;
        if (toM > 12) { toM = 1; toY++; }
      }
      const fromY = item.openM < 0 ? examYear - 1 : examYear;
      const fromM = item.openM < 0 ? -item.openM : (item.openM || 1);
      let wm = 0, y = fromY, m = fromM;
      while (y < toY || (y === toY && m < toM)) { wm++; m++; if (m > 12) { m = 1; y++; } }
      item.monthCap = wm > 0 ? Math.ceil(item.total / wm) : item.total;
    });
    return items;
  }
  const track1 = makeTrack(alloc1, deadline1);

  // Phase A 2차 트랙: monthCap 없이 가능한 만큼 최대 진행 (경계에서 미완성 방지)
  const track2_early = alloc2
    .filter(c => [11, 12, 14].includes(c.seq) && c.status !== 'skipped')
    .sort((a, b) => toKey2(a.openM||0) - toKey2(b.openM||0))
    .map(c => ({ ...c, name: c.name.replace(/<br>/g,''), remaining: c.effective, total: c.effective }));

  // Phase C 2차 트랙: 핵심이론(주력) + 단원별(병행)
  const mainSeqs2 = [3, 8, 9];
  const sideSeqs2 = [4, 6];
  const mainTrack2 = makeTrack(alloc2.filter(c => mainSeqs2.includes(c.seq)), deadline2);
  const sideTrack2 = makeTrack(alloc2.filter(c => sideSeqs2.includes(c.seq)), deadline2);

  const sideTotalEff2  = sideTrack2.reduce((s, c) => s + c.effective, 0);
  const useConcurrent2 = sideTotalEff2 > 0 && !!alloc2.find(c => c.seq === 3 && c.status === 'full');
  const MAIN_RATIO2    = useConcurrent2 ? 144 / (144 + sideTotalEff2) : 1;

  // ── 월별 스케줄 채우기 ────────────────────────────────────────────
  let ci1 = 0, ci2_early = 0, ci_m2 = 0, ci_s2 = 0;
  months.forEach(mo => {
    while (ci1 < track1.length && track1[ci1].remaining <= 0) ci1++;
    while (ci2_early < track2_early.length && track2_early[ci2_early].remaining <= 0) ci2_early++;
    while (ci_m2 < mainTrack2.length && mainTrack2[ci_m2].remaining <= 0) ci_m2++;
    while (ci_s2 < sideTrack2.length && sideTrack2[ci_s2].remaining <= 0) ci_s2++;
    const sch = [];
    const moLec = mo.lec || 1;
    const isPhaseA = mo.year < examYear || (mo.year === examYear && mo.m <= 3);

    // 1차 트랙
    if (mo.lec1 > 0 && ci1 < track1.length) {
      let cap = mo.lec1, taken = 0;
      while (cap > 0 && ci1 < track1.length) {
        if (!isOpen(track1[ci1].openM, mo.year, mo.m, examYear)) {
          sch.push({ name: '부족한 과목 복습', pct: Math.round(cap/moLec*100), rev: true }); break;
        }
        const avail = (track1[ci1].monthCap || cap) - taken;
        if (avail <= 0) break;
        const take = Math.min(track1[ci1].remaining, cap, avail);
        const pct  = Math.round(take / moLec * 100);
        if (pct > 0) sch.push({ name: track1[ci1].name, pct, cat: '1차' });
        track1[ci1].remaining -= take; cap -= take; taken += take;
        if (track1[ci1].remaining <= 0) { ci1++; taken = 0; }
      }
    }

    // 준비 기간 (6월 gap)
    if (mo.gapLec > 0) {
      sch.push({ name: '준비 기간', pct: Math.round(mo.gapLec / moLec * 100), rev: true });
    }

    // Phase A 2차 트랙 (start ~ 3월)
    if (isPhaseA && mo.lec2 > 0 && ci2_early < track2_early.length) {
      let cap = mo.lec2;
      while (cap > 0 && ci2_early < track2_early.length) {
        if (!isOpen(track2_early[ci2_early].openM, mo.year, mo.m, examYear)) break;
        const take = Math.min(track2_early[ci2_early].remaining, cap);
        const pct  = Math.round(take / moLec * 100);
        if (pct > 0) sch.push({ name: track2_early[ci2_early].name, pct, cat: '2차' });
        track2_early[ci2_early].remaining -= take; cap -= take;
        if (track2_early[ci2_early].remaining <= 0) ci2_early++;
      }
    }

    // Phase C 2차 트랙 (late Jun ~ Sep)
    if (!isPhaseA && mo.lec2 > 0) {
      const isCon2 = useConcurrent2 && mo.year === examYear && (mo.m === 7 || mo.m === 8);
      const mainCap2 = isCon2 ? Math.round(mo.lec2 * MAIN_RATIO2) : mo.lec2;
      const sideCap2 = isCon2 ? mo.lec2 - mainCap2 : 0;

      if (mainCap2 > 0) {
        let cap = mainCap2, taken = 0;
        while (cap > 0 && ci_m2 < mainTrack2.length) {
          if (!isOpen(mainTrack2[ci_m2].openM, mo.year, mo.m, examYear)) {
            sch.push({ name: '부족한 과목 복습', pct: Math.round(cap/moLec*100), rev: true }); break;
          }
          const avail = (mainTrack2[ci_m2].monthCap || cap) - taken;
          if (avail <= 0) break;
          const take = Math.min(mainTrack2[ci_m2].remaining, cap, avail);
          const pct  = Math.round(take / moLec * 100);
          if (pct > 0) sch.push({ name: mainTrack2[ci_m2].name, pct, cat: '2차' });
          mainTrack2[ci_m2].remaining -= take; cap -= take; taken += take;
          if (mainTrack2[ci_m2].remaining <= 0) { ci_m2++; taken = 0; }
        }
        if (cap > 0 && ci_m2 >= mainTrack2.length)
          sch.push({ name: '전 과정 최종 복습', pct: Math.round(cap/moLec*100), rev: true });
      }

      if (isCon2 && sideCap2 > 0) {
        let cap = sideCap2;
        while (cap > 0 && ci_s2 < sideTrack2.length) {
          if (!isOpen(sideTrack2[ci_s2].openM, mo.year, mo.m, examYear)) break;
          const take = Math.min(sideTrack2[ci_s2].remaining, cap);
          const pct  = Math.round(take / moLec * 100);
          if (pct > 0) sch.push({ name: sideTrack2[ci_s2].name, pct, cat: '2차' });
          sideTrack2[ci_s2].remaining -= take; cap -= take;
          if (sideTrack2[ci_s2].remaining <= 0) ci_s2++;
        }
      }
    }
    mo.schedule = sch;
  });

  const totalNeeded = CURRS_D.reduce((s, c) => s + c.total, 0);
  const capacity    = totalDays * lpd;
  return { totalDays, capacity, totalNeeded, fullCount, result, months, lpd, examYear };
}

/* ═══════════════ 2차 DUAL-TRACK PLAN ═══════════════ */
// 7~8월: 핵심이론(주력, 2/3) + 단원별문제풀이(병행, 1/3) 동시 진행
// 9월: 마무리100선 + 동형모의고사 전담
// 시간 부족 시 단원별 문제풀이 skipped → 핵심이론 전담 자동 전환
function buildPlan2차() {
  const examDate  = EXAM_2[S.year];
  const examYear  = examDate.getFullYear();
  const startDate = S.startDate;
  const startMid  = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
  const totalDays = Math.ceil((examDate - startMid) / 864e5);
  const lpd = S.hours;

  const months = [];
  let curM = startDate.getMonth() + 1, curY = startDate.getFullYear();
  while (curY < examYear || (curY === examYear && curM <= examDate.getMonth() + 1)) {
    const daysInM = new Date(curY, curM, 0).getDate();
    const startDay = (curM === startDate.getMonth()+1 && curY === startDate.getFullYear()) ? startDate.getDate() : 1;
    const sd = daysInM - startDay + 1;
    months.push({ m: curM, year: curY, sd, lec: sd * lpd, schedule: [] });
    curM++; if (curM > 12) { curM = 1; curY++; }
  }

  const capacity    = totalDays * lpd;
  const totalNeeded = CURRS_2.reduce((s, c) => s + c.total, 0);
  const toKey = m => m < 0 ? (examYear-1)*12+(-m) : examYear*12+(m||0);

  // ── 구간별 용량 계산 ──────────────────────────────────────────
  const examJulyStart = new Date(examYear, 6, 1);
  const actualJulyStart = startDate > examJulyStart ? startDate : examJulyStart;
  const julyDays = 31 - actualJulyStart.getDate() + 1;
  const july_aug_lec   = (julyDays + 31) * lpd;          // 7~8월 실제 강의 수
  const before_july_lec = months                          // 7월 이전 강의 수
    .filter(mo => !(mo.year === examYear && mo.m >= 7))
    .reduce((s, mo) => s + mo.lec, 0);

  // ── 단원별 7~8월 내 완료 가능 여부 ───────────────────────────
  const canObject  = july_aug_lec >= 144 + 150;           // ≥294강
  const canSubject = july_aug_lec >= 144 + 150 + 56;      // ≥350강

  // ── 3구간 배분 ────────────────────────────────────────────────
  const sorted = CURRS_2.map(c => ({ ...c, needed: c.total, status: 'skipped', effective: 0 }));

  // 구간 A — 7월 이전 항목 (기초이론·이론완성): before_july_lec 범위, openM 순
  sorted.filter(c => [1,2,3].includes(c.seq))
    .sort((a, b) => toKey(a.openM||0) - toKey(b.openM||0))
    .reduce((rem, c) => {
      if (rem >= c.needed) { c.status = 'full'; c.effective = c.needed; return rem - c.needed; }
      return rem;
    }, before_july_lec);

  // 구간 B — 핵심이론·마무리100선·동형모의고사: 항상 배분
  [6, 7, 8].forEach(seq => {
    const c = sorted.find(x => x.seq === seq);
    c.status = 'full'; c.effective = c.needed;
  });

  // 구간 C — 단원별 문제풀이: 7~8월 내 완료 가능 여부 기준
  const c4 = sorted.find(c => c.seq === 4);
  const c5 = sorted.find(c => c.seq === 5);
  c4.status = canObject  ? 'full' : 'skipped';  c4.effective = canObject  ? c4.needed : 0;
  c5.status = canSubject ? 'full' : 'skipped';  c5.effective = canSubject ? c5.needed : 0;

  const result    = CURRS_2.map(orig => sorted.find(c => c.seq === orig.seq));
  const fullCount = result.filter(c => c.status === 'full').length;

  // contentLec = 월 원시 용량 그대로 (9월 여유는 최종복습으로 표시)
  months.forEach(mo => { mo.contentLec = mo.lec; });

  // 주력 트랙: 이론완성 계열 + 핵심이론 + 마무리100선 + 동형모의고사
  const mainTrack = result
    .filter(c => c.status !== 'skipped' && [1,2,3,6,7,8].includes(c.seq))
    .sort((a, b) => toKey(a.openM||0) - toKey(b.openM||0) || a.pri - b.pri)
    .map(c => ({ ...c, remaining: c.effective }));

  // 병행 트랙: 단원별 문제풀이 (7~8월 전용)
  const sideTrack = result
    .filter(c => c.status !== 'skipped' && [4,5].includes(c.seq))
    .sort((a, b) => toKey(a.openM||0) - toKey(b.openM||0) || a.pri - b.pri)
    .map(c => ({ ...c, remaining: c.effective }));

  // 병행 모드: side track 존재 시 concurrent (july_aug_lec로 이미 검증됨)
  const sideTotalEff  = sideTrack.reduce((s, c) => s + c.effective, 0);
  const useConcurrent = sideTotalEff > 0 && mainTrack.some(c => c.seq === 6);
  const MAIN_RATIO    = useConcurrent ? 144 / (144 + sideTotalEff) : 1;

  let ci_m = 0, ci_s = 0;
  months.forEach(mo => {
    const isConcurrent = useConcurrent && (mo.m === 7 || mo.m === 8) && mo.year === examYear;
    const mainCap = isConcurrent ? Math.round(mo.contentLec * MAIN_RATIO) : mo.contentLec;
    const sideCap = isConcurrent ? mo.contentLec - mainCap : 0;
    const sch = [];

    // 주력 트랙 스케줄링
    {
      let cap = mainCap;
      while (cap > 0 && ci_m < mainTrack.length) {
        if (!isOpen(mainTrack[ci_m].openM, mo.year, mo.m, examYear)) {
          sch.push({ name: '부족한 과목 복습', pct: Math.round(cap/mo.contentLec*100), rev: true });
          break;
        }
        const take = Math.min(mainTrack[ci_m].remaining, cap);
        const pct  = Math.round(take / mo.contentLec * 100);
        if (pct > 0) sch.push({ name: mainTrack[ci_m].name.replace(/<br>/g,''), pct });
        mainTrack[ci_m].remaining -= take;
        cap -= take;
        if (mainTrack[ci_m].remaining <= 0) ci_m++;
      }
      if (cap > 0 && ci_m >= mainTrack.length)
        sch.push({ name: '전 과정 최종 복습', pct: Math.round(cap/mo.contentLec*100), rev: true });
    }

    // 병행 트랙: 7~8월 한정
    if (isConcurrent && sideCap > 0) {
      let cap = sideCap;
      while (cap > 0 && ci_s < sideTrack.length) {
        if (!isOpen(sideTrack[ci_s].openM, mo.year, mo.m, examYear)) break;
        const take = Math.min(sideTrack[ci_s].remaining, cap);
        const pct  = Math.round(take / mo.contentLec * 100);
        if (pct > 0) sch.push({ name: sideTrack[ci_s].name.replace(/<br>/g,''), pct });
        sideTrack[ci_s].remaining -= take;
        cap -= take;
        if (sideTrack[ci_s].remaining <= 0) ci_s++;
      }
    }

    mo.schedule = sch;
  });

  return { totalDays, capacity, totalNeeded, fullCount, result, months, lpd, examYear };
}

/* ═══════════════ PLAN CALCULATION ═══════════════ */
function buildPlan() {
  if (S.target === '동차') return buildDongchaPlan();
  if (S.target === '2차')  return buildPlan2차();
  const examDate = getExamDate();
  const examYear = examDate.getFullYear();
  const startDate = S.startDate;
  const startMid = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
  const totalDays = Math.ceil((examDate - startMid) / 864e5);
  const lpd = S.hours;

  const CURRS = getCurrs();

  const months = [];
  let curM = startDate.getMonth() + 1;
  let curY = startDate.getFullYear();
  const endM = examDate.getMonth() + 1;
  const endY = examYear;

  while (curY < endY || (curY === endY && curM <= endM)) {
    const daysInM  = new Date(curY, curM, 0).getDate();
    const startDay = (curM === startDate.getMonth()+1 && curY === startDate.getFullYear()) ? startDate.getDate() : 1;
    const sd = daysInM - startDay + 1;
    months.push({ m: curM, year: curY, sd, ld: sd, lec: sd * lpd });
    curM++;
    if (curM > 12) { curM = 1; curY++; }
  }

  const capacity = totalDays * lpd;
  const totalNeeded = CURRS.reduce((s, c) => s + c.total, 0);

  const sorted = CURRS.map(c => ({ ...c, needed: c.total })).sort((a, b) => a.pri - b.pri);
  let rem = capacity;
  sorted.forEach(c => {
    if (rem >= c.needed) { c.status = 'full'; c.effective = c.needed; rem -= c.needed; }
    else                 { c.status = 'skipped'; c.effective = 0; }
  });

  const result = CURRS.map(orig => sorted.find(c => c.seq === orig.seq));
  const fullCount = result.filter(c => c.status === 'full').length;

  const effectiveTotal = result.filter(c => c.status !== 'skipped').reduce((s, c) => s + c.effective, 0);
  const totalCap = months.reduce((s, mo) => s + mo.lec, 0);
  const contentRatio = (effectiveTotal > 0 && effectiveTotal < totalCap) ? effectiveTotal / totalCap : 1;
  months.forEach(mo => { mo.contentLec = Math.max(1, Math.round(mo.lec * contentRatio)); });

  // 동차: openM 시간순(열리는 순서)으로 스케줄, 같은 openM은 priority 순
  // 1차/2차: 기존 seq 순서 유지
  const seqActive = result
    .filter(c => c.status !== 'skipped')
    .sort((a, b) => {
      if (S.target === '동차') {
        const toKey = m => m < 0 ? (examYear - 1) * 12 + (-m) : examYear * 12 + (m || 0);
        const ka = toKey(a.openM || 0), kb = toKey(b.openM || 0);
        if (ka !== kb) return ka - kb;
        return (a.pri || 99) - (b.pri || 99);
      }
      return a.seq - b.seq;
    })
    .map(c => ({ seq: c.seq, name: c.name.replace(/<br>/g, ''), remaining: c.effective, openM: c.openM || 0, cat: c.cat }));

  let ci = 0;
  months.forEach(mo => {
    while (ci < seqActive.length && seqActive[ci].remaining <= 0) ci++;
    let cap = mo.contentLec;
    const sch = [];
    while (cap > 0) {
      if (ci >= seqActive.length) {
        sch.push({ name: '전 과정 최종 복습', pct: Math.round(cap/mo.contentLec*100), rev: true }); break;
      }
      if (!isOpen(seqActive[ci].openM, mo.year, mo.m, examYear)) {
        sch.push({ name: '부족한 과목 복습', pct: Math.round(cap/mo.contentLec*100), rev: true }); break;
      }
      const take = Math.min(seqActive[ci].remaining, cap);
      const pct  = Math.round(take/mo.contentLec*100);
      if (pct > 0) sch.push({ name: seqActive[ci].name, pct, cat: seqActive[ci].cat });
      seqActive[ci].remaining -= take;
      cap -= take;
      if (seqActive[ci].remaining <= 0) ci++;
    }
    mo.schedule = sch;
  });

  return { totalDays, capacity, totalNeeded, fullCount, result, months, lpd, examYear };
}

/* ═══════════════ GENERATE ═══════════════ */
function generate() {
  if (!S.year || !S.target || !S.startDate || !S.hours) {
    alert('시험 연도, 목표, 시작일, 학습 시간을 모두 선택해주세요.');
    return;
  }
  const avail = getAvailableTargets(S.year, S.startDate.getMonth()+1);
  if (!avail.includes(S.target)) {
    alert('선택한 시작일과 목표의 조합이 올바르지 않습니다. 목표를 다시 확인해주세요.');
    return;
  }

  const p = buildPlan();
  window._plan = p;
  renderStats(p);
  renderGantt(p);
  renderCurriculum(p);
  renderWeekly(p);
  renderMonthly(p);

  const el = document.getElementById('results');
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });

  const dlBtn = document.getElementById('download-btn');
  if (dlBtn) dlBtn.style.display = 'block';
  trackUsage();
}

/* ═══════════════ GANTT ═══════════════ */
const GANTT_COLORS = [
  'linear-gradient(90deg,#fb923c,#ea580c)',
  'linear-gradient(90deg,#fbbf24,#d97706)',
  'linear-gradient(90deg,#34d399,#059669)',
  'linear-gradient(90deg,#60a5fa,#2563eb)',
  'linear-gradient(90deg,#a78bfa,#7c3aed)',
  'linear-gradient(90deg,#f472b6,#db2777)',
  'linear-gradient(90deg,#2dd4bf,#0d9488)',
  'linear-gradient(90deg,#e879f9,#a21caf)',
];

function renderGantt(p) {
  if (S.target === '동차') { document.getElementById('gantt-chart').innerHTML = ''; return; }
  const { result, months } = p;
  if (!months.length) { document.getElementById('gantt-chart').innerHTML = ''; return; }

  const numM = months.length;
  const ROW_H = 46;
  // Build bars from openM windows: bar starts at openM, spans full window if curriculum fits
  function openMToDate(openM) {
    if (!openM || openM === 0) return new Date(examYear - 1, 0, 1);
    if (openM < 0) return new Date(examYear - 1, -openM - 1, 1);
    return new Date(examYear, openM - 1, 1);
  }
  function dateToFrac(d) {
    const yr = d.getFullYear(), mn = d.getMonth() + 1, dy = d.getDate();
    for (let i = 0; i < months.length; i++) {
      if (months[i].year === yr && months[i].m === mn) {
        const dim = new Date(yr, mn, 0).getDate();
        return (i + (dy - 1) / dim) / numM;
      }
    }
    return d < new Date(months[0].year, months[0].m - 1, 1) ? 0 : 1;
  }

  const active = result.filter(c => c.status !== 'skipped').sort((a, b) => a.seq - b.seq);
  const examDate = getExamDate();
  const firstMonthDate = new Date(months[0].year, months[0].m - 1, 1);

  const bars = [];
  active.forEach((c, idx) => {
    const cOpenM = c.openM || 0;
    const openDate = openMToDate(cOpenM);

    // Window ends at first subsequent curriculum with a DIFFERENT openM (or day after exam)
    const nextDiff = active.slice(idx + 1).find(nc => (nc.openM || 0) !== cOpenM);
    const windowEndDate = nextDiff
      ? openMToDate(nextDiff.openM || 0)
      : new Date(examDate.getTime() + 86400000);

    const windowDays = Math.max(1, Math.round((windowEndDate - openDate) / 86400000));
    const windowCap  = windowDays * lpd;
    const barEndDate = windowCap >= c.effective
      ? windowEndDate
      : new Date(openDate.getTime() + Math.ceil(c.effective / lpd) * 86400000);

    const startDate = openDate < firstMonthDate ? firstMonthDate : openDate;
    const leftFrac  = Math.max(0, dateToFrac(startDate));
    const rightFrac = Math.min(1, dateToFrac(barEndDate));

    if (rightFrac > leftFrac + 0.005) {
      bars.push({ name: c.name.replace(/<br>/g, ''), leftPct: leftFrac * 100, widthPct: (rightFrac - leftFrac) * 100, color: GANTT_COLORS[idx % GANTT_COLORS.length] });
    }
  });
  bars.sort((a, b) => a.leftPct - b.leftPct);

  function ganttLabel(name) {
    if (name === '단원별문제풀이(객관식)') return '단원별<br>문제풀이<br>(객관식)';
    if (name === '단원별문제풀이(주관식)') return '단원별<br>문제풀이<br>(주관식)';
    return name.replace(/((?:[가-힣]){5,})\(/, '$1<br>(');
  }

  const totalH = bars.length * ROW_H;
  let html = `<div class="gantt-wrap"><div class="gantt-inner">`;
  html += `<div class="gantt-header"><div class="gantt-label-col-h"></div><div class="gantt-month-headers" style="grid-template-columns:repeat(${numM},1fr);">`;
  months.forEach(mo => { html += `<div class="gantt-month-h">${mo.m}월${mo.year !== (S.year || 2026) ? `<span style="font-size:.6rem;opacity:.6;">'${String(mo.year).slice(2)}</span>` : ''}</div>`; });
  html += `</div></div><div class="gantt-body">`;
  html += `<div class="gantt-labels">`;
  bars.forEach(b => { html += `<div class="gantt-label-row" style="height:${ROW_H}px;"><span>${ganttLabel(b.name)}</span></div>`; });
  html += `</div>`;
  html += `<div class="gantt-timeline-area" style="height:${totalH}px;">`;
  html += `<div class="gantt-gridlines" style="grid-template-columns:repeat(${numM},1fr);">`;
  months.forEach(() => { html += `<div class="gantt-gridline"></div>`; });
  html += `</div><div class="gantt-bars" style="height:${totalH}px;">`;
  bars.forEach((b, i) => {
    const showText = b.widthPct >= 14;
    html += `<div class="gantt-bar" data-name="${b.name}" style="left:${b.leftPct.toFixed(2)}%;width:${b.widthPct.toFixed(2)}%;top:${i*ROW_H+8}px;height:${ROW_H-16}px;background:${b.color};">${showText ? `<span>${b.name}</span>` : ''}</div>`;
  });
  html += `</div></div></div></div></div>`;

  document.getElementById('gantt-chart').innerHTML = html;

  let tip = document.getElementById('gantt-tooltip');
  const barsEl = document.querySelector('#gantt-chart .gantt-bars');
  if (barsEl) {
    barsEl.addEventListener('mouseover', e => {
      const bar = e.target.closest('.gantt-bar');
      if (bar) { tip.textContent = bar.dataset.name; tip.style.display = 'block'; }
    });
    barsEl.addEventListener('mousemove', e => {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 40) + 'px';
    });
    barsEl.addEventListener('mouseout', e => {
      if (!e.relatedTarget?.closest('.gantt-bar')) tip.style.display = 'none';
    });
  }
}

/* ═══════════════ STATS ═══════════════ */
function renderStats(p) {
  const { totalDays, capacity, totalNeeded, fullCount, lpd, result } = p;
  const CURRS = getCurrs();
  const hDisp = S.hours >= 7 ? '6h+' : S.hours + 'h';
  const recNeeded = result.filter(c => c.status !== 'skipped').reduce((s, c) => s + c.needed, 0);
  const numCurr = CURRS.length;
  document.getElementById('stat-grid').innerHTML = [
    { val: totalDays + '일',         lbl: '총 학습 기간'          },
    { val: hDisp,                    lbl: '하루 학습 시간'         },
    { val: '약 ' + lpd + '강',       lbl: '하루 수강<br>강의수'    },
    { val: capacity + '강',          lbl: '수강 가능<br>총 강의'   },
    { val: recNeeded + '강',         lbl: '추천 커리큘럼<br>총 강의' },
    { val: fullCount + '/' + numCurr, lbl: '완주 가능<br>과정수'   },
  ].map(s => `<div class="stat-item"><div class="val">${s.val}</div><div class="lbl">${s.lbl}</div></div>`).join('');
}

/* ═══════════════ CURRICULUM ROADMAP ═══════════════ */
function progressKey() { return `jtm_${S.year}_${S.target}_${S.startDate?.toISOString().slice(0,10)}_${S.hours}`; }
function getProgress()  { try { return new Set(JSON.parse(localStorage.getItem(progressKey()) || '[]')); } catch { return new Set(); } }
function saveProgress(s) { localStorage.setItem(progressKey(), JSON.stringify([...s])); }
function toggleDone(seq) { const d = getProgress(); d.has(seq) ? d.delete(seq) : d.add(seq); saveProgress(d); renderCurriculum(window._plan); }
function resetProgress() { localStorage.removeItem(progressKey()); renderCurriculum(window._plan); }

function renderCurriculum(p) {
  if (S.target === '동차') { renderDongchaRoadmap(p); return; }
  const { result } = p;
  const done = getProgress();
  const active = result.filter(c => c.status !== 'skipped');
  const doneCount = active.filter(c => done.has(c.seq)).length;
  const allDone   = active.length > 0 && doneCount === active.length;

  const dots = result.map(c => {
    if (c.status === 'skipped') return `<div class="prog-dot pd-skip"></div>`;
    if (done.has(c.seq))        return `<div class="prog-dot pd-done"></div>`;
    if (c.status === 'partial') return `<div class="prog-dot pd-partial"></div>`;
    return `<div class="prog-dot pd-active"></div>`;
  }).join('');

  const progColor = allDone ? 'var(--green)' : 'var(--gray-700)';
  const progMsg   = allDone ? '🎉 전 과정 완료!' : `${doneCount} / ${active.length} 완료`;
  const progHtml  = `<div class="prog-bar-wrap">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="prog-dots">${dots}</div>
      <span class="prog-txt" style="color:${progColor};">${progMsg}</span>
    </div>
    <button class="prog-reset" onclick="resetProgress()">초기화</button>
  </div>`;

  // Render roadmap (split 1차/2차 for 동차)
  let flowHtml = '';
  const isDongCha = S.target === '동차';

  function renderRow(items, label) {
    const colCount = items.length;
    const minW = colCount * 90;
    let h = '';
    if (label) h += `<div class="rm-section-label">${label}<span></span></div>`;
    h += `<div class="rm-outer"><div class="rm-grid" style="grid-template-columns:repeat(${colCount},1fr);min-width:${minW}px;">`;
    items.forEach(c => {
      const isDone  = done.has(c.seq) && c.status !== 'skipped';
      const baseCls = c.status === 'full' ? 'included' : c.status === 'partial' ? 'partial' : 'skipped';
      const cls     = isDone ? `${baseCls} done` : baseCls;
      const icon    = isDone ? '✅' : c.status === 'full' ? '⬜' : c.status === 'partial' ? '⚡' : '❌';
      const sLbl    = isDone ? '완료!' : c.status === 'full' ? '완주 가능' : c.status === 'partial' ? `${c.pct||'?'}%` : '시간 부족';
      const sClr    = isDone ? 'var(--green)' : baseCls === 'skipped' ? 'var(--gray-400)' : baseCls === 'partial' ? 'var(--amber)' : 'var(--orange)';
      const chkBtn  = c.status !== 'skipped'
        ? `<button class="rm-chk" onclick="toggleDone(${c.seq})">${isDone ? '☑ 완료됨' : '☐ 완료 체크'}</button>` : '';
      const displayName = isDongCha ? c.name.replace(/\[(?:1|2)차\]/g, '') : c.name;
      h += `<div class="rm-cell ${cls}">
        <div class="rm-seq">STEP ${c.seq}</div>
        <div class="rm-name">${displayName}</div>
        <div class="rm-cnt">${c.needed}강</div>
        <div class="rm-icon">${icon}</div>
        <div class="rm-stlbl" style="color:${sClr};">${sLbl}</div>
        ${chkBtn}
      </div>`;
    });
    h += '</div></div>';
    return h;
  }

  if (isDongCha) {
    const items1 = result.filter(c => c.cat === '1차');
    const items2 = result.filter(c => c.cat === '2차');
    flowHtml = renderRow(items1, '🏠 1차 (회계원리·시설개론·민법)') + renderRow(items2, '🏢 2차 (관계법규·관리실무)');
  } else {
    flowHtml = renderRow(result, '');
  }

  // Study path
  const included = result.filter(c => c.status !== 'skipped');
  const skipped  = result.filter(c => c.status === 'skipped');
  const spCols   = included.length;
  const spMinW   = spCols * 90;
  let pathHtml   = `<div class="study-path"><div class="sp-label">📖 실제 학습 순서</div><div class="sp-scroll"><div class="sp-items" style="grid-template-columns:repeat(${spCols},1fr);min-width:${spMinW}px;">`;
  included.forEach(c => {
    const dispName = isDongCha ? c.name.replace(/\[(?:1|2)차\]/g, '') : c.name.replace(/<br>/g, ' ');
    pathHtml += `<div class="sp-tag"><span>${dispName}</span><span class="sp-lec">${c.status==='partial'?c.effective+'/':''}${c.needed}강</span></div>`;
  });
  pathHtml += '</div></div></div>';

  let skipHtml = '';
  if (skipped.length > 0) {
    skipHtml = `<div class="skip-note">⏭️ <strong>생략 과정:</strong> ${skipped.map(c => c.name.replace(/<br>/g,' ').replace(/\[(?:1|2)차\]/g,'')).join(', ')}<br>학습 시작 월을 앞당기거나 하루 학습 시간을 늘리면 추가로 포함됩니다.</div>`;
  }

  const hintHtml = `<div class="prog-hint">📖 각 커리큘럼을 완강하셨나요? <strong>☐ 완료 체크</strong> 버튼을 눌러 나만의 합격 여정을 기록해보세요!<br>꾸준히 함께 가요 💪</div>`;

  document.getElementById('curr-roadmap').innerHTML = progHtml + flowHtml + hintHtml + pathHtml + skipHtml;
}

/* ═══════════════ WEEKLY ═══════════════ */
function renderWeekly(p) {
  const subjs = SUBJECTS[S.target];
  const n = subjs.length;
  const startDate = S.startDate;
  const DAY_NAMES = ['월','화','수','목','금','토','일'];
  const isDongCha = S.target === '동차';

  // 동차 2주 순환 패턴: 인덱스 = 요일(0=일~6=토)
  // null = 복습/휴식, 문자열 = 과목명
  const DONGCHA_TPL = [
    // 1주차(홀수): 목 = 회계원리
    [null, '회계원리', '시설개론', '민법', '회계원리', '관계법규', '관리실무'],
    // 2주차(짝수): 목 = 민법
    [null, '회계원리', '시설개론', '민법', '민법',   '관계법규', '관리실무'],
  ];
  const SUBJ_CLS = { '회계원리':'s0', '시설개론':'s1', '민법':'s2', '관계법규':'s3', '관리실무':'s4' };

  const firstCurr = p.result.find(c => c.status !== 'skipped');
  const currNote = firstCurr
    ? `<div style="margin-bottom:14px;padding:10px 14px;background:var(--orange-light);border:1px solid var(--orange-mid);border-radius:8px;font-size:.84rem;color:#7c2d12;">
         📌 <strong>학습 시작 커리큘럼:</strong> ${firstCurr.name.replace(/<br>/g,' ')} (${firstCurr.needed}강) — 매일 과목을 순환하며 수강합니다.</div>` : '';

  const firstMon = new Date(startDate);
  firstMon.setDate(firstMon.getDate() - ((firstMon.getDay() + 6) % 7));

  const rows = [];
  for (let w = 0; w < 2; w++) {
    const slots = [];
    const tplWeek = w % 2; // 0=1주차패턴, 1=2주차패턴
    for (let d = 0; d < 7; d++) {
      const date = new Date(firstMon);
      date.setDate(firstMon.getDate() + w*7 + d);
      const isPre = date < startDate;
      if (isPre) {
        slots.push({ d: DAY_NAMES[d], empty: true });
      } else if (isDongCha) {
        const subj = DONGCHA_TPL[tplWeek][(d + 1) % 7];
        if (subj === null) {
          slots.push({ d: DAY_NAMES[d], rest: true });
        } else {
          slots.push({ d: DAY_NAMES[d], subj, cls: SUBJ_CLS[subj] });
        }
      } else {
        const dayCount = Math.floor((date - startDate) / 864e5);
        const idx = dayCount % n;
        slots.push({ d: DAY_NAMES[d], subj: subjs[idx], cls: `s${idx}` });
      }
    }
    rows.push({ label: `${w+1}주차`, slots });
  }

  let html = currNote;
  html += `<div class="week-scroll"><table class="week"><thead><tr><th>주차</th>`;
  DAY_NAMES.forEach((d, i) => { html += `<th${i===6?' class="sun-th"':''}>${d}</th>`; });
  html += `</tr></thead><tbody>`;
  rows.forEach(row => {
    html += `<tr><td style="font-weight:700;font-size:.8rem;color:var(--orange);white-space:nowrap;">${row.label}</td>`;
    row.slots.forEach(slot => {
      if (slot.empty) {
        html += `<td></td>`;
      } else if (slot.rest) {
        html += `<td class="rest-td"><span style="font-size:.73rem;color:var(--gray-400);">복습<br>휴식</span></td>`;
      } else {
        const isSun = slot.d === '일';
        html += `<td${isSun?' class="sun-td"':''}><span class="stag ${slot.cls}">${SHORT[slot.subj]||slot.subj}</span><br><span style="font-size:.7rem;color:var(--gray-400);">${S.hours}h</span></td>`;
      }
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;

  if (isDongCha) {
    html += `<div style="margin-top:10px;font-size:.8rem;color:var(--gray-500);background:var(--gray-50);border-radius:8px;padding:8px 12px;">
      ※ <strong>1차 4일</strong>(월·화·수·목) · <strong>2차 2일</strong>(금·토) · <strong>복습/휴식 1일</strong>(일)<br>
      목요일은 격주 교체 — 1주차: 회계원리, 2주차: 민법
    </div>`;
  } else {
    html += `<div style="margin-top:10px;font-size:.8rem;color:var(--gray-500);background:var(--gray-50);border-radius:8px;padding:8px 12px;">※ 매일 ${n}과목을 하루씩 순환 수강합니다. 동일 커리큘럼을 해당 과목 완강 시까지 반복합니다.</div>`;
  }

  document.getElementById('week-table').innerHTML = html;
}

/* ═══════════════ MONTHLY ═══════════════ */

  const examDate2 = S.target !== '1차' ? getExamDate('2차', S.year) : null;

  const BADGE_SHORT = {
    '[1차]기본이론':'기본이론','[1차]핵심&문제풀이':'핵심&문제풀이','[2차]핵심이론':'핵심이론',
    '[2차]단원별(객관식)':'단원별(객관식)','기본이론':'기본이론','핵심이론&<br>문제풀이':'핵심&문제풀이',
    '핵심이론':'핵심이론','단원별<br>문제풀이(객관식)':'단원별(객관식)',
  };

  let html = '';
  months.forEach(({ m, year: mYear, sd, ld, lec, contentLec, schedule }) => {
    const mDate = new Date(mYear, m-1, 1);
    const isExam1 = examDate1 && mDate.getMonth() === examDate1.getMonth() && mDate.getFullYear() === examDate1.getFullYear();
    const isExam2 = examDate2 && mDate.getMonth() === examDate2.getMonth() && mDate.getFullYear() === examDate2.getFullYear();
    const items = schedule || [];
    const mainItem = items.find(it => !it.rev) || null;
    const currItems = items.filter(it => !it.rev);
    const badgeTxt = mainItem ? (BADGE_SHORT[mainItem.name] || mainItem.name) : '';
    let headCls = 'mo-head';
    if (isExam1 && isDongCha) headCls += ' exam1-head';
    else if (isExam2) headCls += ' exam2-head';

    html += `<div class="mo-card">
      <div class="${headCls}">
        <span>${m}월${mYear !== (S.year||2026) ? `<span style="font-size:.65rem;opacity:.7;margin-left:2px;">'${String(mYear).slice(2)}</span>` : ''}${isExam1&&isDongCha ? ' <span class="milestone-badge ms-1st">1차시험</span>' : ''}${isExam2 ? ' 🎯' : ''}${badgeTxt ? `<span style="font-size:.68rem;background:rgba(255,255,255,.25);padding:2px 6px;border-radius:10px;margin-left:6px;">${badgeTxt}</span>` : ''}</span>
        <span style="font-size:.73rem;opacity:.8;flex-shrink:0;white-space:nowrap;margin-left:4px;">${isExam2 ? `시험 ${examDate2?.getDate()}일` : `${sd}일`}</span>
      </div>
      <div class="mo-body">
        <div class="mo-meta">하루 ${lpd}강 × ${ld}일 = 약 ${lec}강</div>`;

    if (currItems.length > 0) {
      currItems.forEach(it => {
        const is2nd = it.cat === '2차';
        html += `<div class="mo-item">
          <div class="mo-item-label"><span>${it.name}</span><span style="color:${is2nd?'var(--purple)':'var(--orange)'};">${it.pct}%</span></div>
          <div class="pb-bg"><div class="pb${is2nd?' pb2':''}" style="width:${it.pct}%"></div></div>
        </div>`;
      });
    } else {
      html += `<div class="mo-done">✅ 전 커리큘럼 완료 · 최종 점검</div>`;
    }
    html += `</div></div>`;
  });

  document.getElementById('mo-grid').innerHTML = html;
}
