/* ═══════════════ 동차 로드맵 테이블 ═══════════════ */
function renderDongchaRoadmap(p) {
  const { result, months } = p;
  const done = getProgress();
  const examDate1 = EXAM_1[S.year];
  const examDate2 = EXAM_2[S.year];

  // name (br 제거) → result item 맵
  const itemByName = new Map();
  result.forEach(c => { itemByName.set(c.name.replace(/<br>/g, ''), c); });

  // 해당 월에서 cat별 대표 항목 (pct 최대)
  function getPrimary(mo, cat) {
    const items = (mo.schedule || []).filter(it => it.cat === cat && !it.rev);
    if (!items.length) return null;
    return items.reduce((a, b) => a.pct >= b.pct ? a : b);
  }

  // 연속된 같은 항목 → colspan 세그먼트
  function buildSegs(cat) {
    const segs = [];
    let i = 0;
    while (i < months.length) {
      const prim = getPrimary(months[i], cat);
      if (!prim) {
        let j = i + 1;
        while (j < months.length && !getPrimary(months[j], cat)) j++;
        segs.push({ colspan: j - i, empty: true });
        i = j;
      } else {
        let j = i + 1;
        while (j < months.length) {
          const np = getPrimary(months[j], cat);
          if (np && np.name === prim.name) j++;
          else break;
        }
        const ri = itemByName.get(prim.name);
        segs.push({
          colspan: j - i,
          dispName: prim.name.replace(/\[(?:1|2)차\]/g, ''),
          total: ri ? ri.total : '?',
          status: ri ? ri.status : 'full',
          pct: ri && ri.status === 'partial' ? ri.pct : null,
          seq: ri ? ri.seq : null,
        });
        i = j;
      }
    }
    return segs;
  }

  const segs1 = buildSegs('1차');
  const segs2 = buildSegs('2차');

  // 헤더
  let html = `<div class="dc-rm-scroll"><table class="dc-rm-table"><thead><tr>`;
  html += `<th style="min-width:62px;border-radius:6px;"></th>`;
  months.forEach(mo => {
    const mDate = new Date(mo.year, mo.m - 1, 1);
    const isE1 = examDate1 && mDate.getMonth() === examDate1.getMonth() && mDate.getFullYear() === examDate1.getFullYear();
    const isE2 = examDate2 && mDate.getMonth() === examDate2.getMonth() && mDate.getFullYear() === examDate2.getFullYear();
    const thCls = isE1 ? ' class="dc-exam1-hd"' : isE2 ? ' class="dc-exam2-hd"' : '';
    const yearTag = mo.year !== S.year ? `<span class="dc-yr">'${String(mo.year).slice(2)}</span>` : '';
    const examTag = isE1 ? `<span class="dc-exam-tag">1차시험</span>` : isE2 ? `<span class="dc-exam-tag">2차시험</span>` : '';
    html += `<th${thCls}>${mo.m}월${yearTag}${examTag}</th>`;
  });
  html += `</tr></thead><tbody>`;

  function buildRow(segs, cat) {
    const labelHtml = cat === '1차'
      ? `<span class="dc-cat-lbl dc-cat1">1차</span><span class="dc-cat-sub">회계·시설·민법</span>`
      : `<span class="dc-cat-lbl dc-cat2">2차</span><span class="dc-cat-sub">관계법규·실무</span>`;
    let row = `<tr><td class="dc-rm-row-hd">${labelHtml}</td>`;
    segs.forEach(seg => {
      if (seg.empty) {
        const emptyLabel = cat === '1차' ? '2차 집중 학습' : '1차 집중 학습';
        row += `<td class="dc-rm-empty" colspan="${seg.colspan}"><span style="font-size:.62rem;color:var(--gray-400);">${emptyLabel}</span></td>`;
      } else {
        const isDone = seg.seq && done.has(seg.seq);
        const baseCls = cat === '2차' ? 'dc-rm-item dc-rm-2' : 'dc-rm-item dc-rm-1';
        const cls = isDone ? baseCls + ' dc-rm-done' : baseCls;
        const lecTxt = seg.pct ? `${seg.total}강 (${seg.pct}%)` : `${seg.total}강`;
        const btnClr = isDone ? 'var(--green)' : cat === '2차' ? 'var(--purple)' : 'var(--orange)';
        const btnTxt = isDone ? '☑ 완료' : '☐ 체크';
        const chkBtn = seg.seq
          ? `<button class="dc-chk-btn" onclick="toggleDone(${seg.seq})" style="color:${btnClr};border-color:${btnClr};">${btnTxt}</button>`
          : '';
        row += `<td class="${cls}" colspan="${seg.colspan}">
          <div class="dc-item-name">${seg.dispName}</div>
          <div class="dc-item-lec">${lecTxt}</div>
          ${chkBtn}
        </td>`;
      }
    });
    row += `</tr>`;
    return row;
  }

  html += buildRow(segs1, '1차');
  html += buildRow(segs2, '2차');
  html += `</tbody></table></div>`;

  // 범례
  html += `<div class="dc-legend">
    <span class="dc-legend-item"><span class="dc-leg-box dc-leg-1"></span>1차 과목</span>
    <span class="dc-legend-item"><span class="dc-leg-box dc-leg-2"></span>2차 과목</span>
    <span class="dc-legend-item"><span class="dc-leg-box dc-leg-done"></span>완료</span>
    <span class="dc-legend-item" style="color:var(--gray-400);font-style:italic;">회색 = 집중 학습 기간</span>
  </div>`;

  // 진행 상황
  const active = result.filter(c => c.status !== 'skipped');
  const doneCount = active.filter(c => done.has(c.seq)).length;
  const allDone = active.length > 0 && doneCount === active.length;
  const dots = result.map(c => {
    if (c.status === 'skipped') return `<div class="prog-dot pd-skip"></div>`;
    if (done.has(c.seq))        return `<div class="prog-dot pd-done"></div>`;
    if (c.status === 'partial') return `<div class="prog-dot pd-partial"></div>`;
    return `<div class="prog-dot pd-active"></div>`;
  }).join('');
  const progColor = allDone ? 'var(--green)' : 'var(--gray-700)';
  const progMsg = allDone ? '🎉 전 과정 완료!' : `${doneCount} / ${active.length} 완료`;

  html += `<div class="prog-bar-wrap" style="margin-top:14px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="prog-dots">${dots}</div>
      <span class="prog-txt" style="color:${progColor};">${progMsg}</span>
    </div>
    <button class="prog-reset" onclick="resetProgress()">초기화</button>
  </div>`;

  html += `<div class="prog-hint">📖 각 커리큘럼을 완강하셨나요? 표의 <strong>☐ 체크</strong> 버튼을 눌러 나만의 합격 여정을 기록해보세요! 💪</div>`;

  const skipped = result.filter(c => c.status === 'skipped');
  if (skipped.length > 0) {
    html += `<div class="skip-note">⏭️ <strong>생략 과정:</strong> ${skipped.map(c => c.name.replace(/<br>/g,' ').replace(/\[(?:1|2)차\]/g,'')).join(', ')}<br>학습 시작 월을 앞당기거나 하루 학습 시간을 늘리면 추가로 포함됩니다.</div>`;
  }

  document.getElementById('curr-roadmap').innerHTML = html;
}

function goMyPlan() {
  const saved = loadMyPlan();
  if (!saved) return;
  if (saved.year) {
    document.querySelectorAll('#year-group .opt-btn').forEach(b => b.classList.toggle('active', +b.dataset.v === saved.year));
    S.year = saved.year;
    calMax = S.year === 2027 ? new Date(2027,8,20) : new Date(2026,8,19);
  }
  if (saved.startDate) {
    const d = new Date(saved.startDate);
    S.startDate = d;
    calYear = d.getFullYear(); calMonth = d.getMonth();
  }
  renderCalendar();
  updateTargetAvailability();
  document.querySelectorAll('#target-group .opt-btn').forEach(b => b.classList.toggle('active', b.dataset.v === saved.target));
  S.target = saved.target;
  document.querySelectorAll('.hours-btn').forEach(b => b.classList.toggle('active', +b.dataset.v === saved.hours));
  S.hours = saved.hours;
  updateBanner();
  updateHoursHint();
  generate();
}

/* ═══════════════ 사용 현황 ═══════════════ */
const STATS_KEY = 'jtm_stats';

function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    if (!raw) return { total: 0, byTarget: {'1차':0,'2차':0,'동차':0}, daily: {} };
    return JSON.parse(raw);
  } catch { return { total: 0, byTarget: {'1차':0,'2차':0,'동차':0}, daily: {} }; }
}

function saveStats(data) {
  localStorage.setItem(STATS_KEY, JSON.stringify(data));
}

function trackUsage() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const today = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const data = loadStats();
  data.total = (data.total || 0) + 1;
  const tgt = S.target || '';
  if (tgt in data.byTarget) data.byTarget[tgt]++;
  if (!data.daily[today]) data.daily[today] = { total: 0, byTarget: {'1차':0,'2차':0,'동차':0} };
  data.daily[today].total++;
  if (tgt in data.daily[today].byTarget) data.daily[today].byTarget[tgt]++;
  saveStats(data);
}

function showStats() {
  document.getElementById('stats-overlay').classList.add('open');
  const data = loadStats();
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayKey = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const todayEntry = (data.daily || {})[todayKey];
  data.today = todayEntry ? (todayEntry.total || 0) : 0;
  renderStatsModal(data);
}

function closeStats() {
  document.getElementById('stats-overlay').classList.remove('open');
}

function renderStatsModal(data) {
  const bt = data.byTarget || {};
  const daily = data.daily || {};
  const monthMap = {};
  Object.entries(daily).forEach(([dateStr, entry]) => {
    const ym = dateStr.slice(0, 7);
    if (!monthMap[ym]) monthMap[ym] = { total: 0, byTarget: {'1차':0,'2차':0,'동차':0}, days: [] };
    const isObj = typeof entry === 'object' && entry !== null;
    const dayTotal = isObj ? (entry.total||0) : (entry||0);
    const dayBt = (isObj && entry.byTarget) ? entry.byTarget : null;
    monthMap[ym].total += dayTotal;
    if (dayBt) {
      ['1차','2차','동차'].forEach(k => { monthMap[ym].byTarget[k] = (monthMap[ym].byTarget[k]||0) + (dayBt[k]||0); });
    }
    monthMap[ym].days.push({ date: dateStr, total: dayTotal, byTarget: dayBt });
  });
  const months = Object.keys(monthMap).sort().reverse().map(ym => {
    const [y, m] = ym.split('-');
    monthMap[ym].days.sort((a, b) => b.date.localeCompare(a.date));
    return { ym, label: `${y}년 ${parseInt(m)}월`, ...monthMap[ym] };
  });
  const dash = '<span style="color:#cbd5e1">-</span>';
  const fbt = (obj, k) => obj ? (obj[k]||0) : dash;
  const monthRows = months.length ? months.map(mo => {
    const dayRows = mo.days.map(d => {
      const dd = parseInt(d.date.split('-')[2]);
      return `<tr class="stats-day-row" data-ym="${mo.ym}" style="display:none">
        <td style="padding-left:26px;font-size:.8rem">∟ ${dd}일</td>
        <td class="col-total">${d.total}건</td>
        <td class="col-target">${fbt(d.byTarget,'1차')}</td>
        <td class="col-target">${fbt(d.byTarget,'2차')}</td>
        <td class="col-target">${fbt(d.byTarget,'동차')}</td>
      </tr>`;
    }).join('');
    return `<tr class="stats-month-row" onclick="toggleMonthRows('${mo.ym}',this)">
        <td><span class="stats-month-chevron">▶</span>${mo.label}</td>
        <td class="col-total">${mo.total}건</td>
        <td class="col-target">${mo.byTarget['1차']||0}</td>
        <td class="col-target">${mo.byTarget['2차']||0}</td>
        <td class="col-target">${mo.byTarget['동차']||0}</td>
      </tr>${dayRows}`;
  }).join('') : '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:12px">데이터 없음</td></tr>';

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-row">
      <span class="s-lbl">오늘 계획 생성</span>
      <span class="s-val">${data.today ?? 0}건</span>
    </div>
    <div class="stats-row">
      <span class="s-lbl">전체 누적</span>
      <span class="s-val">${data.total ?? 0}건</span>
    </div>
    <div class="stats-section-title">목표별 현황</div>
    <div class="stats-target-row">
      <div class="stats-target-card"><div class="tc-lbl">1차</div><div class="tc-val">${bt['1차']??0}</div></div>
      <div class="stats-target-card"><div class="tc-lbl">2차</div><div class="tc-val">${bt['2차']??0}</div></div>
      <div class="stats-target-card"><div class="tc-lbl">동차</div><div class="tc-val">${bt['동차']??0}</div></div>
    </div>
    <div class="stats-section-title">월/일별 누적현황</div>
    <table class="stats-daily-table">
      <thead><tr><th>월/일</th><th>총</th><th>1차</th><th>2차</th><th>동차</th></tr></thead>
      <tbody>${monthRows}</tbody>
    </table>`;
}

function toggleMonthRows(ym, rowEl) {
  const chevron = rowEl.querySelector('.stats-month-chevron');
  const isOpen = chevron.classList.contains('open');
  chevron.classList.toggle('open', !isOpen);
  document.querySelectorAll(`.stats-day-row[data-ym="${ym}"]`).forEach(r => {
    r.style.display = isOpen ? 'none' : 'table-row';
  });
}

// PDF 전용 일별 커리큘럼 분배 (target별 전략 분기)
function buildMonthDaysPDF(mo, lpd, target) {
  const { m, year, sd, lec, schedule } = mo;
  const daysInM = new Date(year, m, 0).getDate();
  const startDay = daysInM - sd + 1;
  const endDay   = startDay + sd - 1;
  const dayMap   = new Map();

  // 非일요일 단일 큐 분배 (일요일은 빈 항목으로 처리)
  function queueDistribute(items) {
    const queue = [];
    items.forEach(it => {
      const n = Math.round(it.pct / 100 * lec);
      if (n > 0) queue.push({ name: it.name.replace(/<br>/g,'').replace(/\[(?:1|2)차\]/g,''), lec: n, cat: it.cat, rev: !!it.rev });
    });
    let qi = 0, rem = queue[0]?.lec || 0;
    for (let d = startDay; d <= endDay; d++) {
      const dow = new Date(year, m-1, d).getDay();
      if (dow === 0) { dayMap.set(d, []); continue; }
      const dayItems = []; let cap = lpd;
      while (cap > 0 && qi < queue.length) {
        const take = Math.min(rem, cap);
        if (take > 0) {
          const last = dayItems[dayItems.length - 1];
          if (last && last.name === queue[qi].name) last.lec += take;
          else dayItems.push({ ...queue[qi], lec: take });
        }
        rem -= take; cap -= take;
        if (rem <= 0) { qi++; rem = qi < queue.length ? queue[qi].lec : 0; }
      }
      dayMap.set(d, dayItems);
    }
  }

  const items = (schedule || []).filter(it => !it.rev);

  if (target === '동차') {
    // 1차/2차 별도 큐 - 요일별 track 매핑
    const q1 = [], q2 = [];
    (schedule || []).forEach(it => {
      const n = Math.round(it.pct / 100 * lec);
      if (n <= 0) return;
      const obj = { name: it.name.replace(/<br>/g,'').replace(/\[(?:1|2)차\]/g,''), lec: n, cat: it.cat };
      if (it.cat === '1차') q1.push(obj); else q2.push(obj);
    });
    let qi1 = 0, rem1 = q1[0]?.lec || 0;
    let qi2 = 0, rem2 = q2[0]?.lec || 0;
    for (let d = startDay; d <= endDay; d++) {
      const dow = new Date(year, m-1, d).getDay();
      if (dow === 0) { dayMap.set(d, []); continue; }
      const is1차 = [1,2,3,4].includes(dow);
      const queue = is1차 ? q1 : q2;
      let qi = is1차 ? qi1 : qi2;
      let rem = is1차 ? rem1 : rem2;
      const dayItems = []; let cap = lpd;
      while (cap > 0 && qi < queue.length) {
        const take = Math.min(rem, cap);
        if (take > 0) {
          const last = dayItems[dayItems.length - 1];
          if (last && last.name === queue[qi].name) last.lec += take;
          else dayItems.push({ ...queue[qi], lec: take });
        }
        rem -= take; cap -= take;
        if (rem <= 0) { qi++; rem = qi < queue.length ? queue[qi].lec : 0; }
      }
      dayMap.set(d, dayItems);
      if (is1차) { qi1 = qi; rem1 = rem; } else { qi2 = qi; rem2 = rem; }
    }
  } else if (items.length > 1) {
    // 2차 병행월: 매일 비례 분배
    const totalPct = items.reduce((s, it) => s + it.pct, 0) || 100;
    for (let d = startDay; d <= endDay; d++) {
      const dow = new Date(year, m-1, d).getDay();
      if (dow === 0) { dayMap.set(d, []); continue; }
      dayMap.set(d, items.map(it => ({
        name: it.name.replace(/<br>/g,''), lec: Math.max(1, Math.round(lpd * it.pct / totalPct)), cat: it.cat
      })).filter(x => x.lec > 0));
    }
  } else {
    queueDistribute(schedule || []);
  }
  return { dayMap, startDay, endDay, daysInM };
}

// 월별 계획 페이지 HTML — 주별 3행 테이블 (날짜/과목/강의) 형식
function buildMonthPageHTML(mo, lpd, quote, planInfo) {
  const { m, year, sd } = mo;
  const { examDate1, examDate2, target, examYear } = planInfo;
  const daysInM = new Date(year, m, 0).getDate();
  const { dayMap, startDay, endDay } = buildMonthDaysPDF(mo, lpd, target);

  // 제N회 시험 번호
  const MONTH_KR  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const examN     = examYear === 2026 ? 29 : 30;
  const tgtLabel  = target === '1차' ? '1차목표' : target === '2차' ? '2차목표' : '동차목표';
  const title     = `${year}년 제${examN}회 ${tgtLabel} ${MONTH_KR[m-1]} 학습계획`;

  // 요일별 과목 배치 (0=일,1=월,...,6=토)
  const SUBJ_TMPL = {
    '1차': [null, '회계원리', '시설개론', '민법', '회계원리', '시설개론', '민법'],
    '2차': [null, '관계법규', '관리실무', '관계법규', '관리실무', '관계법규', '관리실무'],
    '동차': [null, '회계원리', '시설개론', '민법', '회계원리', '관계법규', '관리실무'],
  };
  const subjTpl = SUBJ_TMPL[target] || SUBJ_TMPL['동차'];

  const isExam1Mo = examDate1 && examDate1.getFullYear() === year && examDate1.getMonth()+1 === m;
  const isExam2Mo = examDate2 && examDate2.getFullYear() === year && examDate2.getMonth()+1 === m;
  const examDay   = isExam1Mo ? examDate1.getDate() : isExam2Mo ? examDate2.getDate() : null;

  function getCurrLabel(dn, dow) {
    const items = dayMap.get(dn) || [];
    if (!items.length) return '';
    if (target === '동차') {
      const is1차 = [1,2,3,4].includes(dow);
      const fil = items.filter(it => is1차 ? it.cat === '1차' : it.cat === '2차');
      return (fil.length > 0 ? fil : items).map(it => it.name).join(' / ');
    }
    return items.map(it => it.name).join(' / ');
  }

  // 주 단위 배열 구성 (0=일 기준)
  const firstDow = new Date(year, m-1, 1).getDay();
  const DAY_HDR  = ['일','월','화','수','목','금','토'];
  const HDR_BG   = '#1e3a8a';
  const GBN_BG   = '#e8f0fe';
  const GBN_TXT  = '#1e3a8a';

  const weeks = [];
  let ws = 1 - firstDow;
  while (ws <= daysInM) {
    const w = [];
    for (let d = 0; d < 7; d++) { const dn = ws+d; w.push(dn>=1&&dn<=daysInM?dn:null); }
    if (w.some(d => d!==null)) weeks.push(w);
    ws += 7;
  }

  // TD 공통 스타일
  const tdBase = 'text-align:center;border:1px solid #e2e8f0;';
  const thBase = `background:${HDR_BG};text-align:center;border:1px solid ${HDR_BG};font-size:12px;font-weight:700;`;
  const gbnTd  = `background:${GBN_BG};color:${GBN_TXT};text-align:center;border:1px solid #c7d4f0;font-size:11.5px;font-weight:700;padding:8px 10px;white-space:nowrap;`;

  let tbody = '';
  weeks.forEach(week => {
    // 날짜 행
    let r1 = `<tr><td style="${gbnTd}">날짜</td>`;
    week.forEach((dn, di) => {
      const red = di===0||di===6;
      r1 += `<td style="${tdBase}padding:8px 4px;font-size:11px;font-weight:${dn?'600':'400'};color:${red?'#ef4444':'#374151'};">${dn?`${m}월 ${dn}일`:''}</td>`;
    });
    r1 += '</tr>';

    // 과목 행
    let r2 = `<tr><td style="${gbnTd}">과목</td>`;
    week.forEach((dn, di) => {
      const isSun   = di===0;
      const isStudy = dn!==null && dn>=startDay && dn<=endDay;
      const isExam  = dn!==null && dn===examDay;
      let txt = '';
      if (isExam)           txt = '<span style="color:#dc2626;font-weight:700;">시험일</span>';
      else if (!isSun && isStudy) txt = subjTpl[di] || '';
      r2 += `<td style="${tdBase}padding:8px 4px;font-size:11px;color:#374151;">${txt}</td>`;
    });
    r2 += '</tr>';

    // 강의 행
    let r3 = `<tr><td style="${gbnTd}">강의</td>`;
    week.forEach((dn, di) => {
      const isSun   = di===0;
      const isStudy = dn!==null && dn>=startDay && dn<=endDay;
      const isExam  = dn!==null && dn===examDay;
      let txt = '';
      if (!isExam && isStudy) txt = isSun ? '복습/휴식' : getCurrLabel(dn, di);
      r3 += `<td style="${tdBase}padding:8px 4px;font-size:10.5px;color:#374151;">${txt}</td>`;
    });
    r3 += '</tr>';

    tbody += r1 + r2 + r3;
  });

  const thead = `<tr>
    <th style="${thBase}color:#fff;padding:9px 12px;width:54px;">구분</th>
    ${DAY_HDR.map((d,i) => `<th style="${thBase}color:${(i===0||i===6)?'#fca5a5':'#fff'};padding:9px 6px;">${d}</th>`).join('')}
  </tr>`;

  return `<div style="width:1050px;background:#fff;padding:28px 36px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;">
    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:19px;font-weight:800;color:#1e293b;margin-bottom:8px;letter-spacing:-.3px;">${title}</div>
      <div style="font-size:13px;color:#64748b;font-style:italic;">&quot;${quote.text}&quot;${quote.author ? ` &mdash; ${quote.author}` : ''}</div>
    </div>
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
      <thead>${thead}</thead>
      <tbody>${tbody}</tbody>
    </table>
  </div>`;
}

async function downloadPDF(btn) {

    return;
  }
  const orig = btn.innerHTML;
  btn.disabled = true;

  try {
    const plan = window._plan;
    const tLbl = S.target || '';
    const hLbl = S.hours >= 7 ? '6시간+' : S.hours + '시간';
    const dStr = S.startDate ? S.startDate.toLocaleDateString('ko-KR', {month:'numeric',day:'numeric'}) : '';
    const examDate1 = S.target !== '2차' ? EXAM_1[S.year] : null;
    const examDate2  = S.target !== '1차' ? EXAM_2[S.year] : null;
    const planInfo   = { tLbl, hLbl, examDate1, examDate2, target: S.target, examYear: plan.examYear };

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const A4_W = 210, A4_H = 297;

    // ── Page 1: Portrait — 로드맵 + 나의 학습 현황 + 실제 학습 순서 ─
    btn.innerHTML = `⏳ 1/${plan.months.length + 1}`;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:absolute;left:-9999px;top:0;width:820px;background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;';

    wrap.innerHTML = `<div style="background:linear-gradient(135deg,#7c2d12,#ea580c);color:#fff;padding:16px 28px;text-align:center;">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px;">🏠 주택관리사 학습계획</div>
      <div style="font-size:12px;opacity:.85;">${tLbl} 목표 &nbsp;·&nbsp; ${dStr} 시작 &nbsp;·&nbsp; 하루 ${hLbl}</div>
    </div>`;

    // 간트 로드맵
    const ganttEl = document.getElementById('gantt-chart');
    if (ganttEl && ganttEl.innerHTML.trim()) {
      const ganttSec = document.createElement('div');
      ganttSec.style.cssText = 'padding:14px 28px 8px;';
      ganttSec.innerHTML = '<div style="font-size:13px;font-weight:700;color:#374151;border-bottom:2px solid #e5e7eb;padding-bottom:8px;margin-bottom:12px;">📚 추천 커리큘럼 학습 로드맵</div>';
      ganttSec.appendChild(ganttEl.cloneNode(true));
      wrap.appendChild(ganttSec);
    }

    // 나의 학습 현황
    const statEl = document.getElementById('stat-grid');
    if (statEl) {
      const statSec = document.createElement('div');
      statSec.style.cssText = 'padding:8px 28px 12px;';
      statSec.innerHTML = '<div style="font-size:13px;font-weight:700;color:#374151;border-bottom:2px solid #e5e7eb;padding-bottom:8px;margin-bottom:12px;">📊 나의 학습 현황</div>';
      const sc = statEl.cloneNode(true);
      sc.style.cssText = 'display:grid;grid-template-columns:repeat(6,1fr);gap:10px;';
      statSec.appendChild(sc);
      wrap.appendChild(statSec);
    }

    // 실제 학습 순서
    const included = plan.result.filter(c => c.status !== 'skipped');
    if (included.length > 0) {
      const isDc = S.target === '동차';
      let pathInner = '';
      included.forEach((c, i) => {
        const nm = isDc ? c.name.replace(/\[(?:1|2)차\]/g,'') : c.name.replace(/<br>/g,' ');
        const tagBg = (c.cat === '2차') ? '#ede9fe' : '#fff7ed';
        const tagBorder = (c.cat === '2차') ? '#7c3aed' : '#ea580c';
        const tagTxt = (c.cat === '2차') ? '#5b21b6' : '#9a3412';
        pathInner += `<div style="background:${tagBg};border:1.5px solid ${tagBorder};border-radius:8px;padding:8px 10px;text-align:center;flex:1;min-width:70px;">
          <div style="font-size:10.5px;font-weight:700;color:${tagTxt};line-height:1.35;">${nm}</div>
          <div style="font-size:9.5px;color:#64748b;margin-top:2px;">${c.effective}강</div>
        </div>`;
        if (i < included.length - 1) pathInner += '<div style="color:#22c55e;font-size:14px;flex-shrink:0;align-self:center;">→</div>';
      });
      const pathSec = document.createElement('div');
      pathSec.style.cssText = 'padding:0 28px 14px;';
      pathSec.innerHTML = `<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:12px 14px;">
        <div style="font-size:12px;font-weight:700;color:#15803d;margin-bottom:10px;">📖 실제 학습 순서 (커리큘럼 순서에 따라 순차 진행)</div>
        <div style="display:flex;flex-wrap:nowrap;gap:5px;align-items:stretch;">${pathInner}</div>
      </div>`;
      wrap.appendChild(pathSec);
    }

    wrap.insertAdjacentHTML('beforeend',
      `<div style="text-align:center;padding:10px;font-size:10px;color:#94a3b8;border-top:1px solid #e5e7eb;">
        생성일: ${new Date().toLocaleDateString('ko-KR')} · 주택관리사 학습계획 플래너
      </div>`);

    document.body.appendChild(wrap);
    const canvas1 = await html2canvas(wrap, { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' });
    document.body.removeChild(wrap);

    const imgH1 = A4_W * (canvas1.height / canvas1.width);
    pdf.addImage(canvas1.toDataURL('image/png'), 'PNG', 0, 0, A4_W, Math.min(imgH1, A4_H));

    // ── Pages 2+: Landscape — 월별 학습계획 캘린더 ────────────────
    const LS_W = 297, LS_H = 210, LS_M = 8;
    for (let i = 0; i < plan.months.length; i++) {
      btn.innerHTML = `⏳ ${i+2}/${plan.months.length+1}`;
      const mo    = plan.months[i];
      const quote = STUDY_QUOTES[i % STUDY_QUOTES.length];
      const mDiv  = document.createElement('div');
      mDiv.style.cssText = 'position:absolute;left:-9999px;top:0;display:inline-block;';
      mDiv.innerHTML = buildMonthPageHTML(mo, plan.lpd, quote, planInfo);
      document.body.appendChild(mDiv);
      const mCanvas = await html2canvas(mDiv, { scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff' });
      document.body.removeChild(mDiv);

      pdf.addPage('a4', 'l');
      const imgW = LS_W - LS_M * 2;
      const imgH = imgW * (mCanvas.height / mCanvas.width);
      const imgY = Math.max(LS_M, (LS_H - Math.min(imgH, LS_H - LS_M * 2)) / 2);
      pdf.addImage(mCanvas.toDataURL('image/png'), 'PNG', LS_M, imgY, imgW, Math.min(imgH, LS_H - LS_M * 2));
    }

    pdf.save(`주택관리사_학습계획_${tLbl}_${dStr.replace(/\./g,'').replace(/ /g,'')}시작.pdf`);
  } catch(e) {
    console.error('PDF 생성 오류:', e);
    alert('PDF 생성 중 오류가 발생했습니다.');
  } finally {
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}
</script>
</body>
</html>
